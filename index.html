<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="analytics-endpoint" content="https://bilateria.org/app/estadistica/metac/track.php">
  <meta name="analytics-stats-url" content="https://bilateria.org/app/estadistica/metac/admin-stats.php">
  <meta name="analytics-site-id" content="metac">
  <title>Metac — Recursos metodológicos para el aula</title>
  <link rel="icon" type="image/svg+xml" href="metac-logo.svg">
  <script>(function(){var p=localStorage.getItem('metac_theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');document.documentElement.setAttribute('data-theme-pref',p);})();</script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 8px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 24px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--shadow);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -.02em;
      flex-shrink: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-img {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
    }
    .logo small {
      display: block;
      font-size: .65rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: .02em;
      margin-top: 2px;
    }
    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      flex-shrink: 0;
    }
    #searchInput {
      width: 100%;
      padding: 8px 38px 8px 36px;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: .875rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      line-height: 1;
      transition: background .12s, color .12s;
    }
    .search-clear:hover { background: var(--border); color: var(--text); }
    .search-clear.visible { display: inline-flex; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .lang-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .lang-btn {
      padding: 6px 13px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: background .12s, color .12s;
      letter-spacing: .04em;
    }
    .lang-btn.active { background: var(--primary); color: #fff; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text);
      transition: background .12s, border-color .12s, box-shadow .12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg); box-shadow: var(--shadow); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); justify-content: center; }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-danger { color: #dc2626; border-color: #fca5a5; justify-content: center; }
    .btn-danger:hover { background: #fee2e2; }
    .assistant-link {
      text-decoration: none;
      max-width: 320px;
    }
    .assistant-link-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,.96);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.45);
    }
    .assistant-link img {
      width: 14px;
      height: 14px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .assistant-link span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fav-badge {
      background: #f59e0b;
      color: #fff;
      border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      font-weight: 800;
    }

    /* ── Filter tabs ── */
    .block-nav,
    .field-nav {
      background: var(--bg);
      border-bottom: 0;
      padding: 0;
      overflow-x: visible;
    }
    .block-nav { padding-top: 8px; padding-bottom: 4px; }
    .field-nav { padding-bottom: 0; }
    .field-nav-inner,
    .block-nav-inner {
      width: min(calc(100% - 40px), 1360px);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 2px 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .block-nav-inner {
      padding: 6px 10px;
      background: #fff7ed;
      border-color: #fed7aa;
    }
    .field-nav-inner {
      padding: 4px 10px;
      background: var(--surface);
    }
    .field-tab,
    .block-tab {
      padding: 8px 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      border-bottom: 0;
      border-radius: 999px;
      transition: color .12s, border-color .12s;
      flex-shrink: 0;
    }
    .block-tab {
      font-size: .84rem;
      font-weight: 650;
      color: #9a3412;
    }
    .field-tab:hover { color: var(--text); }
    .block-tab:hover {
      color: #7c2d12;
      background: #ffedd5;
    }
    .field-tab.active {
      color: var(--primary);
      font-weight: 700;
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px #bfdbfe;
    }
    .block-tab.active {
      color: #fff;
      font-weight: 800;
      background: #ea580c;
      box-shadow: inset 0 0 0 1px #c2410c;
    }

    /* ── Filters: horizontal scroll on mobile ── */
    @media (max-width: 640px) {
      .field-nav-inner,
      .block-nav-inner {
        width: calc(100% - 20px);
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .field-nav-inner::-webkit-scrollbar,
      .block-nav-inner::-webkit-scrollbar { display: none; }
    }

    /* ── Shared banner ── */
    .shared-banner {
      background: #eff6ff;
      border-bottom: 1px solid #bfdbfe;
      padding: 9px 20px;
      display: none;
    }
    .shared-banner.visible { display: block; }
    .shared-banner-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .shared-banner-inner span { font-size: .875rem; color: #1d4ed8; flex: 1; }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 20px;
    }
    .results-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .results-info {
      font-size: .8rem;
      color: var(--text-muted);
    }
    .sort-wrap,
    .per-page-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
    }
    .sort-wrap select,
    .per-page-wrap select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: .8rem;
      color: var(--text);
      cursor: pointer;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .page-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: .82rem;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, border-color .12s;
      font-weight: 500;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg); border-color: #cbd5e1; }
    .page-btn:disabled { opacity: .35; cursor: default; }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }
    .page-ellipsis { font-size: .82rem; color: var(--text-muted); padding: 0 4px; line-height: 34px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid #cbd5e1;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,.09), 0 1px 2px rgba(0,0,0,.06);
      cursor: pointer;
      transition: box-shadow .15s, transform .1s, border-color .15s;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.07); transform: translateY(-2px); border-color: #94a3b8; }
    .card.is-fav { border-color: #fcd34d; }
    .card.is-shared { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    .card.is-selected {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15,118,110,.18);
      background: #f0fdfa;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .card-name {
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
      display: inline-block;
      padding: 8px 10px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
      border: 1px solid #dbe7ff;
      color: #0f172a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }
    .fav-star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 1px;
      line-height: 1;
      filter: grayscale(1) opacity(0.28);
      transition: filter .12s, transform .12s;
      flex-shrink: 0;
    }
    .fav-star:hover { filter: grayscale(0) opacity(0.7); transform: scale(1.2); }
    .fav-star.active { filter: none; }

    .card-prog-icon {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .7rem; color: var(--primary); opacity: .65;
      flex-shrink: 0; margin-top: 1px;
    }
    .card:hover .card-prog-icon { opacity: 1; }

    .card-fields { display: flex; flex-wrap: wrap; gap: 5px; }
    .card-block { display: flex; flex-wrap: wrap; gap: 5px; }
    .field-badge {
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 50px;
      border: 1px solid transparent;
      letter-spacing: .02em;
    }
    .field-badge[data-c="0"] { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
    .field-badge[data-c="1"] { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
    .field-badge[data-c="2"] { background:#faf5ff; color:#7e22ce; border-color:#e9d5ff; }
    .field-badge[data-c="3"] { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .field-badge[data-c="4"] { background:#f0fdfa; color:#0f766e; border-color:#99f6e4; }
    .field-badge[data-c="5"] { background:#fef2f2; color:#b91c1c; border-color:#fecaca; }
    .field-badge[data-c="6"] { background:#eef2ff; color:#4338ca; border-color:#c7d2fe; }
    .field-badge[data-c="7"] { background:#fffbeb; color:#b45309; border-color:#fde68a; }
    .field-badge[data-c="8"] { background:#ecfeff; color:#0e7490; border-color:#a5f3fc; }
    .field-badge[data-c="9"] { background:#fdf2f8; color:#be185d; border-color:#fbcfe8; }
    [data-theme="dark"] .field-badge[data-c="0"] { background:#431407; color:#fdba74; border-color:#7c2d12; }
    [data-theme="dark"] .field-badge[data-c="1"] { background:#052e16; color:#86efac; border-color:#14532d; }
    [data-theme="dark"] .field-badge[data-c="2"] { background:#3b0764; color:#d8b4fe; border-color:#581c87; }
    [data-theme="dark"] .field-badge[data-c="3"] { background:#1e3a8a; color:#93c5fd; border-color:#1e40af; }
    [data-theme="dark"] .field-badge[data-c="4"] { background:#134e4a; color:#5eead4; border-color:#0f766e; }
    [data-theme="dark"] .field-badge[data-c="5"] { background:#450a0a; color:#fca5a5; border-color:#7f1d1d; }
    [data-theme="dark"] .field-badge[data-c="6"] { background:#312e81; color:#a5b4fc; border-color:#3730a3; }
    [data-theme="dark"] .field-badge[data-c="7"] { background:#451a03; color:#fcd34d; border-color:#78350f; }
    [data-theme="dark"] .field-badge[data-c="8"] { background:#083344; color:#67e8f9; border-color:#0e7490; }
    [data-theme="dark"] .field-badge[data-c="9"] { background:#500724; color:#f9a8d4; border-color:#831843; }
    .block-badge {
      font-size: .68rem;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 50px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      letter-spacing: .02em;
    }
    .card-summary { font-size: .78rem; color: var(--text-muted); line-height: 1.5; }
    .card-select {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: transparent;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 800;
      flex-shrink: 0;
      transition: background .12s, border-color .12s, color .12s;
    }
    .card-select.active {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
    }
    .selection-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: 20px;
      z-index: 350;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
    }
    .selection-bar-info {
      font-size: .82rem;
      color: var(--text-muted);
    }
    .selection-bar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Empty / Loading ── */
    .state-box {
      text-align: center;
      padding: 70px 20px;
      color: var(--text-muted);
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .state-box h3 { font-size: 1rem; color: var(--text); margin-bottom: 5px; }
    .state-box p { font-size: .85rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(3px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      transform: translateY(12px) scale(.97);
      transition: transform .18s;
    }
    .overlay.open .modal { transform: none; }

    .modal-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .modal-title-wrap { flex: 1; min-width: 0; }
    .modal-title { font-size: 1.2rem; font-weight: 800; line-height: 1.3; }
    .modal-id { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .modal-head-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: background .12s, border-color .12s;
    }
    .icon-btn:hover { background: var(--bg); }
    .icon-btn.fav-active { color: #f59e0b; border-color: #fcd34d; background: #fffbeb; }
    [data-theme="dark"] .icon-btn { border-color: #475569; color: #cbd5e1; }
    [data-theme="dark"] .icon-btn:hover { background: #0f172a; border-color: #64748b; color: #f1f5f9; }
    [data-theme="dark"] .icon-btn.fav-active { color: #f59e0b; border-color: #fcd34d; background: #1c1108; }
    #modalFavBtn:not(.fav-active) { filter: grayscale(1) opacity(0.35); }

    .modal-meta {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .modal-tags-row { font-size: .88rem; color: var(--text-muted); font-style: italic; line-height: 1.6; }

    /* Program links */
    .modal-programs {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .modal-programs-label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: 2px;
    }
    .program-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 50px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .12s, border-color .12s;
    }
    .program-btn:hover { background: #dbeafe; border-color: #93c5fd; }
    .program-btn svg { flex-shrink: 0; }

    .modal-related {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .modal-related-label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: 2px;
    }
    .related-btn {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: var(--bg);
      color: var(--primary);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .related-btn:hover { background: #eff6ff; border-color: #bfdbfe; }

    .modal-body {

      flex: 1;

    .desc-table { border-collapse: collapse; width: 100%; margin: 10px 0 14px; font-size: .82rem; }
    .desc-table th, .desc-table td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; vertical-align: top; }
    .desc-table th { background: #eff6ff; color: var(--primary); font-weight: 700; }

    .section-label { font-weight: 700; color: var(--primary); }

      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    #printArea { display: none; }

    @media print {

        position: static !important;
        width: 100% !important;

    }

    /* ── Favorites panel ── */
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.25);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s;
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    .side-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 360px;
      max-width: 100vw;
      background: var(--surface);
      box-shadow: -4px 0 24px rgba(0,0,0,.12);
      z-index: 410;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .22s ease;
    }
    .panel-overlay.open .side-panel { transform: none; }

    .panel-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-head h2 { font-size: 1rem; font-weight: 800; }
    .panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    .fav-item {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background .12s;
    }
    .fav-item:hover { background: var(--bg); }
    .fav-item-name { flex: 1; font-size: .875rem; font-weight: 600; }
    .fav-remove {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: .9rem;
      padding: 2px 5px; border-radius: 4px;
      transition: color .12s, background .12s;
    }
    .fav-remove:hover { color: #dc2626; background: #fee2e2; }

    .panel-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1e293b;
      color: #fff;
      padding: 9px 20px;
      border-radius: 50px;
      font-size: .82rem;
      z-index: 1000;
      transition: transform .25s ease;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Category panel ── */
    .panel-new-cat {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text-muted);
      transition: border-color .12s, color .12s, background .12s;
      margin-bottom: 10px;
    }
    .panel-new-cat:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

    .cat-section {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: visible;
    }
    .cat-section-head {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: var(--bg);
      gap: 6px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .cat-title {
      flex: 1; font-size: .82rem; font-weight: 700;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cat-count {
      font-size: .72rem; color: var(--text-muted);
      background: var(--border); padding: 1px 6px;
      border-radius: 50px; flex-shrink: 0;
    }
    .cat-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .cat-act {
      width: 24px; height: 24px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      font-size: .78rem; color: var(--text-muted);
      transition: background .1s, color .1s;
    }
    .cat-act:hover { background: var(--border); color: var(--text); }
    .cat-act.danger:hover { background: #fee2e2; color: #dc2626; }

    .cat-items { padding: 6px; display: flex; flex-direction: column; gap: 3px; }
    .cat-items .fav-item { margin-bottom: 0; }

    .fav-tag-btn {
      background: none; border: 1px solid transparent; cursor: pointer;
      border-radius: 4px; padding: 3px 5px;
      color: var(--text-muted); opacity: 0;
      transition: opacity .15s, background .1s, border-color .1s, color .1s;
      display: flex; align-items: center;
    }
    .fav-item:hover .fav-tag-btn { opacity: 1; }
    .fav-tag-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--primary) !important; opacity: 1 !important; }

    .cat-picker-wrap { position: relative; }
    .card-fav-wrap {
      display: inline-flex;
      flex-shrink: 0;
      line-height: 1;
    }
    .cat-picker {
      position: absolute;
      right: 0; top: calc(100% + 4px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      z-index: 700;
      min-width: 175px;
      overflow: hidden;
    }
    .cat-picker-title {
      padding: 6px 10px;
      font-size: .72rem; font-weight: 700; color: var(--text-muted);
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .cat-picker-row {
      padding: 6px 10px;
      display: flex; align-items: center; gap: 7px;
      font-size: .82rem; cursor: pointer; transition: background .1s;
    }
    .cat-picker-row:hover { background: var(--bg); }
    .cat-picker-row input { cursor: pointer; accent-color: var(--primary); }
    .cat-picker-add {
      padding: 6px 10px; border-top: 1px solid var(--border);
      font-size: .82rem; color: var(--primary); cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: background .1s;
    }
    .cat-picker-add:hover { background: #eff6ff; }

    /* ── Responsive ── */
    /* ── Footer ── */
    .site-footer {
      margin-top: 48px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 28px 20px;
      text-align: center;
      font-size: .78rem;
      color: var(--text-muted);
      line-height: 1.9;
    }
    .site-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .site-footer a:hover { text-decoration: underline; }
    .footer-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px 18px;
      margin-bottom: 8px;
    }
    .footer-sep { color: var(--border); }
    .footer-licenses {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 14px;
      margin-top: 6px;
      font-size: .73rem;
    }
    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: var(--bg);
    }

    @media (max-width: 600px) {
      .logo small { display: none; }
      .cards-grid { grid-template-columns: 1fr; }
      .selection-bar { align-items: stretch; flex-direction: column; }
      .selection-bar-actions { width: 100%; }
      .side-panel { width: 100%; }
      .modal { max-height: 95vh; }
      .overlay { padding: 8px; }
      .modal-head { padding: 12px 14px 10px; }
      .modal-title { font-size: 1rem; }
      .modal-meta { padding: 8px 14px; gap: 5px; }
      .modal-meta .card-fields { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
      .modal-meta .card-fields::-webkit-scrollbar { display: none; }
      .modal-programs,
      .modal-related { padding: 8px 14px; }
      .modal-body { padding: 14px; }
      .modal-foot { padding: 8px 14px; }
      #assistantLinkLabel { display: none; }
      .assistant-link { padding: 7px 10px; }
      #selectBtnLabel { display: none; }
      #favBtnLabel { display: none; }
      .header-inner { gap: 8px; }
      .search-wrap { min-width: 0; }
      .header-right {
        width: 100%;
        overflow-x: auto;
        flex-wrap: nowrap;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 2px;
      }
      .header-right::-webkit-scrollbar { display: none; }
    }

    /* ── Theme toggle button ── */
    .theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background .15s, color .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .theme-btn:hover { background: var(--bg); color: var(--text); box-shadow: var(--shadow); }

    /* ═══════════════════════════ DARK MODE ═══════════════════════════ */
    [data-theme="dark"] {
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 4px 8px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
      --shadow-lg: 0 12px 24px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.4);
    }
    [data-theme="dark"] .block-nav-inner {
      background: #1c0e04;
      border-color: #431407;
    }
    [data-theme="dark"] .block-tab { color: #fb923c; }
    [data-theme="dark"] .block-tab:hover { color: #fdba74; background: rgba(251,146,60,.12); }
    [data-theme="dark"] .block-badge {
      background: #1c0e04;
      border-color: #431407;
      color: #fb923c;
    }
    [data-theme="dark"] .field-nav-inner { background: #1a2233; }
    [data-theme="dark"] .field-tab.active {
      background: rgba(96,165,250,.12);
      box-shadow: inset 0 0 0 1px rgba(96,165,250,.3);
    }
    [data-theme="dark"] .shared-banner {
      background: #0d1b33;
      border-bottom-color: #1e3a5f;
    }
    [data-theme="dark"] .shared-banner-inner span { color: #93c5fd; }
    [data-theme="dark"] .card-name {
      background: linear-gradient(135deg, #1e293b 0%, #1a2744 100%);
      border-color: #2d3f6b;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    [data-theme="dark"] .card { border-color: #334155; box-shadow: 0 2px 6px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2); }
    [data-theme="dark"] .card:hover { border-color: #64748b; box-shadow: 0 6px 16px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.25); }
    [data-theme="dark"] .card.is-selected { border-color: #0d9488; background: #0d2420; }
    [data-theme="dark"] .program-btn {
      background: #0f1f3d;
      border-color: #1e3a6e;
      color: #93c5fd;
    }
    [data-theme="dark"] .program-btn:hover { background: #1a2f52; border-color: #3b82f6; }
    [data-theme="dark"] .search-clear { background: rgba(15,23,42,.96); }
    [data-theme="dark"] .btn-danger:hover { background: #2d1515; }
    [data-theme="dark"] .cat-act.danger:hover { background: #2d1515; color: #f87171; }
    [data-theme="dark"] .fav-remove:hover { color: #f87171; background: #2d1515; }
    [data-theme="dark"] .cat-picker-add:hover { background: #0f1f3d; }
    [data-theme="dark"] .modal-header { background: var(--surface); }
    [data-theme="dark"] .modal-footer { background: var(--surface); border-top-color: var(--border); }

    /* ── Map mode: restore surface color in header/navs ── */
    body.map-mode header,
    body.map-mode .block-nav,
    body.map-mode .field-nav { background: var(--surface); }

    /* ── Map View ── */
    #mapView {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      top: 0;
      background: var(--surface);
      z-index: 60;
      display: none;
      overflow: hidden;
    }
    #mapCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #mapCanvas.dragging { cursor: grabbing; }
    #mapCanvas.hovering { cursor: pointer; }
    .map-toolbar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 12px;
      box-shadow: var(--shadow-md);
      z-index: 10;
    }
    .map-toolbar-info {
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
      padding-right: 4px;
    }
    .map-back-btn {
      border-color: var(--primary);
      color: var(--primary);
    }
    .map-back-btn:hover { background: #eff6ff; }
    .map-toolbar-hint {
      font-size: .72rem;
      color: var(--text-muted);
      white-space: nowrap;
      border-left: 1px solid var(--border);
      padding-left: 8px;
      opacity: 0.8;
    }
    .map-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s;
      flex-shrink: 0;
      line-height: 1;
    }
    .map-btn:hover { background: var(--bg); }
    .map-btn.active { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
    [data-theme="dark"] .map-btn.active { background: #0f1f3d; border-color: #3b82f6; color: #60a5fa; }
    #mapTooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      max-width: 250px;
      pointer-events: none;
      box-shadow: var(--shadow-md);
      z-index: 70;
      display: none;
    }
    #mapTooltip strong {
      display: block;
      font-size: .84rem;
      margin-bottom: 3px;
      color: var(--text);
    }
    #mapTooltip span {
      font-size: .78rem;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #mapViewBtn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    #mapViewBtn.active:hover { background: var(--primary-dark); }

    /* Map hint banner */
    .map-hint-banner {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: flex-start;
      padding: 12px 18px 12px 16px;
      max-width: min(500px, calc(100vw - 48px));
      width: max-content;
      cursor: pointer;
      transition: opacity .3s, transform .3s;
    }
    .map-hint-banner.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(-8px);
    }
    .map-hint-body { display: flex; flex-direction: column; gap: 6px; }
    .map-hint-row {
      display: flex;
      align-items: baseline;
      gap: 9px;
      font-size: .82rem;
      line-height: 1.4;
      color: var(--text);
    }
    .map-hint-icon { font-size: .9rem; flex-shrink: 0; }
    .map-hint-close { display: none; }

    /* Map node info panel */
    .map-node-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 280px;
      max-width: calc(100% - 32px);
      max-height: calc(100% - 100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 15;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .map-node-panel.visible { display: flex; }
    .map-node-panel.is-dragging { box-shadow: 0 18px 32px rgba(0,0,0,.16), 0 6px 12px rgba(0,0,0,.08); }
    .map-node-panel.collapsed {
      max-height: none;
    }
    .map-panel-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 14px 8px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .map-node-panel.collapsed .map-panel-head {
      padding: 8px 10px;
    }
    .map-node-panel.is-dragging .map-panel-head { cursor: grabbing; }
    .map-panel-name {
      flex: 1;
      font-size: .92rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      min-width: 0;
    }
    .map-node-panel.collapsed .map-panel-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: .84rem;
    }
    .map-panel-close,
    .map-panel-toggle,
    .map-panel-compact-open {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
    }
    .map-panel-compact-open { display: none; }
    .map-node-panel.collapsed .map-panel-compact-open { display: flex; }
    .map-node-panel.collapsed .map-panel-scroll,
    .map-node-panel.collapsed .map-panel-foot {
      display: none;
    }
    .map-panel-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      min-height: 0;
      touch-action: pan-y;
    }
    .map-panel-badges {
      padding: 0 14px 8px;
      flex-wrap: wrap;
      gap: 4px;
      display: flex;
    }
    .map-panel-summary {
      padding: 0 14px 10px;
      font-size: .8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .map-panel-related {
      padding: 8px 14px 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: flex-start;
    }
    .map-panel-rel-label {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 100%;
      margin-bottom: 2px;
    }
    .map-rel-chip { font-size: .75rem; padding: 3px 9px; }
    .map-legend {

      left: 10px;

      border: 1px solid var(--border);

      z-index: 10;
      min-width: 130px;
      max-width: 210px;
      pointer-events: auto;
    }
    .map-legend.is-dragging { box-shadow: var(--shadow-lg); }
    .map-legend-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .map-legend.is-dragging .map-legend-head { cursor: grabbing; }
    .map-legend-title {
      font-size: .68rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      flex: 1;

  <style>

    [data-theme="dark"] .eval-tab.active-dim { background: #451a03; color: #fde68a; border-color: #f59e0b; }

    /* ── Eval entity chips (modal + cards) ──────────────────── */
    .eval-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 50px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: opacity .12s;
      white-space: nowrap;

    .eval-chip[data-prefix="TEC"] { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
    .eval-chip[data-prefix="INS"] { background: #dcfce7; color: #15803d; border-color: #4ade80; }
    .eval-chip[data-prefix="HER"] { background: #f3e8ff; color: #7e22ce; border-color: #c084fc; }
    .eval-chip[data-prefix="DIM"] { background: #fef3c7; color: #b45309; border-color: #fbbf24; }
    [data-theme="dark"] .eval-chip[data-prefix="TEC"] { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }
    [data-theme="dark"] .eval-chip[data-prefix="INS"] { background: #14532d; color: #86efac; border-color: #22c55e; }
    [data-theme="dark"] .eval-chip[data-prefix="HER"] { background: #3b0764; color: #d8b4fe; border-color: #a855f7; }
    [data-theme="dark"] .eval-chip[data-prefix="DIM"] { background: #451a03; color: #fde68a; border-color: #f59e0b; }

    /* ── "Cómo evaluar" section inside technique modal ──────── */
    .modal-eval {
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .modal-eval-head {
      padding: 10px 20px 4px;
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .eval-group {
      padding: 3px 20px 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .eval-group-label {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 110px;
      flex-shrink: 0;
    }

    /* ── Eval entity cards ───────────────────────────────────── */
    .eval-card .card-type-row {
      margin-bottom: 4px;
    }
    .eval-card .card-name {
      font-size: .92rem;
    }
    .eval-card .card-summary {
      font-size: .8rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;

    /* Meta badges inside eval modal */
    .meta-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 50px;
      font-size: .75rem;
      font-weight: 500;
      background: var(--hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
  </style>
</head>

// ─── JSON LOADER ─────────────────────────────────────────────────────────────

function fromJSON(items, lang = DEFAULT_LANG) {
  return items.filter(item => item.name).map((item, rowIndex) => {
    const fields = [], fieldIds = [];
    (item.fields || []).forEach(f => {
      const norm = normalizeField(f, lang);
      if (norm.id && !fieldIds.includes(norm.id)) {
        fieldIds.push(norm.id);
        fields.push(norm.label);
      }
    });
    const blocks = [], blockIds = [];
    if (item.block) {
      const nb = normalizeBlock(item.block, lang);
      if (nb.id) { blockIds.push(nb.id); blocks.push(nb.label); }
    }
    return {
      id:       normalizeId(item.id) || `row_${rowIndex + 1}`,
      name:     item.name || '',
      desc:     item.desc || '',
      tags:     item.tags || [],
      blocks,
      blockIds,
      fields,
      fieldIds,
      programs: item.programs || [],
      summary:  item.summary || '',
      related:  item.related || [],
      eval_ids: item.eval_ids || [],
    };
  });
}

function normalizeId(value) {
  return value === null || value === undefined ? '' : String(value).trim();
}

function buildIdMap(data) {
  const map = new Map();
  data.forEach((item, idx) => {
    if (!item.id) return;
    if (map.has(item.id)) console.warn(`Duplicate methodological resource ID: ${item.id}`);
    else map.set(item.id, { item, idx });
  });
  return map;
}

function orderDateKey(date = new Date()) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function hashString(value) {
  let hash = 2166136261;
  for (let i = 0; i < value.length; i++) {
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function dailyRank(itemId) {
  return hashString(`${DAILY_ORDER_KEY}:${normalizeId(itemId)}`);
}

function sortRows(rows) {
  return rows.sort((a, b) => {
    if (S.sortMode === 'alpha' || S.sortMode === 'alphaDesc') {
      const byName = a.item.name.localeCompare(b.item.name, S.lang, { sensitivity: 'base', numeric: true });
      if (byName) return S.sortMode === 'alphaDesc' ? -byName : byName;
      return a.idx - b.idx;
    }

    return dailyRank(a.id) - dailyRank(b.id) || a.idx - b.idx;
  });
}

function alphaByLabel(a, b) {
  return String(a || '').localeCompare(String(b || ''), S.lang, { sensitivity: 'base', numeric: true });
}

function rowById(itemId, lang = S.lang) {
  return (S.byId[lang] || new Map()).get(normalizeId(itemId)) || null;
}

function itemById(itemId, lang = S.lang) {
  const row = rowById(itemId, lang);
  return row ? row.item : null;
}

function relatedBidirectional(item, lang = S.lang) {
  const byId = S.byId[lang] || new Map();
  const data  = S.data[lang] || [];
  const ids = new Set((item.related || []).filter(id => id !== item.id));
  data.forEach(t => { if (t.id !== item.id && (t.related || []).includes(item.id)) ids.add(t.id); });
  return [...ids].map(id => byId.get(id)?.item).filter(Boolean)
    .sort((a, b) => alphaByLabel(a.name, b.name));
}

function uniqueIds(ids) {
  const seen = new Set();
  const out = [];
  ids.forEach(value => {
    const id = normalizeId(value);
    if (id && !seen.has(id)) {
      seen.add(id);
      out.push(id);
    }
  });
  return out;
}

function validItemIds(ids, lang = S.lang) {
  const map = S.byId[lang] || new Map();
  return uniqueIds(ids).filter(id => map.has(id));
}

function sortedItemIds(ids, lang = S.lang) {
  const map = S.byId[lang] || new Map();
  return validItemIds(ids, lang).sort((a, b) => map.get(a).idx - map.get(b).idx);
}

function refsToItemIds(refs, lang = S.lang) {
  const data = S.data[lang] || [];
  const map = S.byId[lang] || new Map();
  return uniqueIds(refs).map(ref => {
    if (map.has(ref)) return ref;
    if (/^\d+$/.test(ref)) {
      const legacyItem = data[Number(ref)];
      return legacyItem ? legacyItem.id : '';
    }
    return '';
  }).filter(id => id && map.has(id));
}

function normalizeStoredRefs(lang = S.lang) {
  if (!S.data[lang]) return;

  const favs = refsToItemIds([...S.favorites], lang);
  const favsChanged = favs.length !== S.favorites.size || favs.some(id => !S.favorites.has(id));
  S.favorites = new Set(favs);
  if (favsChanged) saveFavs();

  let catsChanged = false;
  S.categories = S.categories.map(cat => {
    const rawIds = Array.isArray(cat.itemIds) ? cat.itemIds : [];
    const itemIds = refsToItemIds(rawIds, lang);
    if (itemIds.length !== rawIds.length || itemIds.some((id, idx) => id !== rawIds[idx])) catsChanged = true;
    return { id: cat.id, name: cat.name, itemIds };
  });
  if (catsChanged) saveCats();
}

// Parse "Label1|url1 ; Label2|url2"
function parsePrograms(raw) {
  return raw.split(';').map(s => s.trim()).filter(Boolean).map(entry => {
    const pipe = entry.indexOf('|');
    if (pipe === -1) return null;
    return { label: entry.slice(0, pipe).trim(), url: entry.slice(pipe + 1).trim() };
  }).filter(Boolean);
}

// ─── FIELD UTILS ─────────────────────────────────────────────────────────────

function canonicalKey(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/['`´]/g, "'")
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function taxonomyLabel(def, lang = S.lang) {
  return def.labels[lang] || def.labels[DEFAULT_LANG] || def.id;
}

function taxonomyDescription(def, lang = S.lang) {
  return (def.descriptions && (def.descriptions[lang] || def.descriptions[DEFAULT_LANG])) || '';
}

function taxonomyHint(label, description) {
  return description || label;
}

function buildTaxonomyIndex(defs) {
  const map = new Map();
  defs.forEach(def => {
    Object.values(def.labels).forEach(label => map.set(canonicalKey(label), def));
    Object.values(def.aliases || {}).flat().forEach(alias => map.set(canonicalKey(alias), def));
  });
  return map;
}

const BLOCK_INDEX = buildTaxonomyIndex(BLOCK_DEFS);
const FIELD_INDEX = buildTaxonomyIndex(FIELD_DEFS);

function customTaxonomyId(prefix, value) {
  const key = canonicalKey(value);
  return key ? `${prefix}:${key}` : '';
}

function normalizeBlock(value, lang = S.lang) {
  const raw = String(value || '').trim();
  if (!raw) return { id: '', label: '' };
  const def = BLOCK_INDEX.get(canonicalKey(raw));
  return def
    ? { id: def.id, label: taxonomyLabel(def, lang) }
    : { id: customTaxonomyId('block', raw), label: raw };
}

function normalizeField(value, lang = S.lang) {
  const raw = String(value || '').trim();
  if (!raw) return { id: '', label: '' };
  const def = FIELD_INDEX.get(canonicalKey(raw));
  return def
    ? { id: def.id, label: taxonomyLabel(def, lang) }
    : { id: customTaxonomyId('field', raw), label: raw };
}

const colorCache = {};
function fieldColorIdx(name) {
  if (colorCache[name] !== undefined) return colorCache[name];
  const n = canonicalKey(name);
  for (let i = 0; i < FIELD_MAP.length; i++) {
    if (FIELD_MAP[i].some(kw => n.includes(kw))) {
      return (colorCache[name] = i);
    }
  }
  const h = [...name].reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0xffff, 0);
  return (colorCache[name] = h % COLORS.length);
}

function fieldColor(name) { return COLORS[fieldColorIdx(name)]; }

function blockColorIdxById(blockId) {
  const idx = BLOCK_DEFS.findIndex(b => b.id === blockId);
  if (idx >= 0) return idx % COLORS.length;
  const h = [...blockId].reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0xffff, 0);
  return h % COLORS.length;
}

function badgeHTML(field) {
  return `<span class="field-badge" data-c="${fieldColorIdx(field)}">${esc(field)}</span>`;
}

function blockBadgeHTML(block) {
  return block ? `<span class="block-badge">${esc(block)}</span>` : '';
}

function knownOrder(defs, id) {
  const idx = defs.findIndex(def => def.id === id);
  return idx === -1 ? defs.length : idx;
}

function taxonomyDescriptionById(defs, id, lang = S.lang) {
  const def = defs.find(item => item.id === id);
  return def ? taxonomyDescription(def, lang) : '';
}

function blockDescription(id, lang = S.lang) {
  return taxonomyDescriptionById(BLOCK_DEFS, id, lang);
}

function fieldDescription(id, lang = S.lang) {
  return taxonomyDescriptionById(FIELD_DEFS, id, lang);
}

function blockScopedData() {
  const data = S.data[S.lang] || [];
  return S.block ? data.filter(item => item.blockIds.includes(S.block)) : data;
}

function allBlocks() {
  const map = new Map();
  (S.data[S.lang] || []).forEach(item => {
    (item.blockIds || []).forEach((id, idx) => {
      if (!map.has(id)) map.set(id, {
        id,
        label: item.blocks[idx],
        description: blockDescription(id),
      });
    });
  });
  return [...map.values()]
    .sort((a, b) => knownOrder(BLOCK_DEFS, a.id) - knownOrder(BLOCK_DEFS, b.id) || a.label.localeCompare(b.label));
}

function allFields() {
  const map = new Map();
  blockScopedData().forEach(item => {
    item.fieldIds.forEach((id, idx) => {
      if (id && !map.has(id)) map.set(id, {
        id,
        label: item.fields[idx],
        description: fieldDescription(id),
      });
    });
  });
  return [...map.values()]
    .sort((a, b) => knownOrder(FIELD_DEFS, a.id) - knownOrder(FIELD_DEFS, b.id) || a.label.localeCompare(b.label));
}

function syncActiveFilters() {
  if (S.block && !allBlocks().some(block => block.id === S.block)) {
    S.block = null;
    S.field = null;
  }
  if (S.field && !allFields().some(field => field.id === S.field)) S.field = null;
}

// ─── DESCRIPTION FORMATTER ───────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function inlineFormat(raw) {
  return raw.split(/<br\s*\/?>/i)
    .map(part => esc(part)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>'))
    .join('<br>');
}

function formatDesc(text) {
  const lines = text.split('\n');
  let html = '', list = [], tableLines = [];

  const flush = () => {
    if (!list.length) return;
    html += '<ol>' + list.map(li => `<li>${li}</li>`).join('') + '</ol>';
    list = [];
  };

  const flushTable = () => {
    if (!tableLines.length) return;
    let head = true, tableHtml = '<table class="desc-table"><thead>';
    tableLines.forEach(line => {
      const clean = line.replace(/\|h\s*$/, '').trim();
      if (/^\|[\s\-:|\s]+\|$/.test(clean)) return; // separator row
      const cells = clean.split('|').slice(1, -1);  // drop first/last empty
      const tag = head ? 'th' : 'td';
      if (head) {
        tableHtml += '<tr>' + cells.map(c => `<th>${inlineFormat(c.trim())}</th>`).join('') + '</tr></thead><tbody>';
        head = false;
      } else {
        tableHtml += '<tr>' + cells.map(c => `<td>${inlineFormat(c.trim())}</td>`).join('') + '</tr>';
      }
    });
    tableHtml += '</tbody></table>';
    html += tableHtml;
    tableLines = [];
  };

  for (let idx = 0; idx < lines.length; idx++) {
    const raw = lines[idx];
    const line = raw.trim();

    if (line.startsWith('|')) {
      flush();
      tableLines.push(line);
      continue;
    } else {
      flushTable();
    }

    if (!line) {
      if (list.length) {
        let next = idx + 1;
        while (next < lines.length && !lines[next].trim()) next++;
        if (next < lines.length && /^\d+\.\s+/.test(lines[next].trim())) continue;
      }
      flush();
      continue;
    }

    if (line.startsWith('## ')) {
      flush();
      html += `<h4>${esc(line.slice(3))}</h4>`;
      continue;
    }

    const num = line.match(/^\d+\.\s+([\s\S]+)/);
    if (num) { list.push(inlineFormat(num[1])); continue; }

    flush();

    // Section header: starts with 2+ uppercase letters then colon
    const sec = line.match(/^([A-ZÁÉÍÓÚÀÈÌÒÙÜÑÇ][A-ZÁÉÍÓÚÀÈÌÒÙÜÑÇ\s\(\)\/,']+:)\s*(.*)/);
    if (sec) {
      html += `<p><span class="section-label">${esc(sec[1])}</span>${sec[2] ? ' ' + inlineFormat(sec[2]) : ''}</p>`;
    } else {
      html += `<p>${inlineFormat(line)}</p>`;
    }
  }

  flush();
  flushTable();
  return html;
}

// ─── DATA FETCH ──────────────────────────────────────────────────────────────

async function loadLang(lang) {
  lang = resolveLang(lang);
  if (S.data[lang]) return;
  const res = await fetch(LOCAL_JSON[lang]);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const items = await res.json();
  S.data[lang] = fromJSON(items, lang);
  S.byId[lang] = buildIdMap(S.data[lang]);
  normalizeStoredRefs(lang);
}

// ─── EVALMAP DATA ────────────────────────────────────────────────────────────

async function loadEvalLang(lang) {
  lang = resolveLang(lang);
  if (EV.data[lang]) return;
  const entries = Object.entries(LOCAL_EVAL_JSON);
  const results = await Promise.all(
    entries.map(([, pathFn]) => fetch(pathFn(lang)).then(r => r.ok ? r.json() : []))
  );
  const byId = new Map();
  const combined = {};
  entries.forEach(([cat], i) => {
    combined[cat] = results[i];
    results[i].forEach(e => byId.set(e.id, e));
  });
  EV.data[lang] = combined;
  EV.byId[lang] = byId;
}

function evalEntityById(id, lang = S.lang) {

async function copy(text) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const t = document.createElement('textarea');
    t.value = text; t.style.cssText = 'position:fixed;opacity:0';
    document.body.append(t); t.select();
    document.execCommand('copy'); t.remove();
  }
  toast(i('copied'));
}

function filteredData() {
  const data = S.data[S.lang] || [];

  let indexed = S.shared
    ? refsToItemIds(S.shared).map(id => {
      const row = rowById(id);
      return row ? { item: row.item, id, idx: row.idx } : null;
    }).filter(Boolean)
    : data.map((item, idx) => ({ item, id: item.id, idx }));

  if (S.block)
    indexed = indexed.filter(({ item }) => item.blockIds.includes(S.block));

  if (S.field)
    indexed = indexed.filter(({ item }) => item.fieldIds.includes(S.field));

  const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const q = norm(S.search.trim());
  if (q) indexed = indexed.filter(({ item }) =>
    norm(item.id).includes(q) ||
    norm(item.name).includes(q) ||
    norm(item.desc).includes(q) ||
    norm(item.summary).includes(q) ||
    item.blocks.some(b => norm(b).includes(q)) ||
    item.tags.some(t => norm(t).includes(q)) ||
    item.fields.some(f => norm(f).includes(q)) ||
    item.programs.some(p =>
      norm(p.label).includes(q) ||
      norm(p.url).includes(q)
    )
  );

  return sortRows(indexed);
}

function clearSelection(render = true) {
  S.selected.clear();
  S.selectMode = false;
  if (render) {
    applyI18N();
    renderCards();
  }
}

function toggleSelectMode() {
  S.selectMode = !S.selectMode;
  if (!S.selectMode) S.selected.clear();
  applyI18N();
  renderCards();
}

function toggleCardSelection(itemId) {
  if (S.selected.has(itemId)) S.selected.delete(itemId);
  else S.selected.add(itemId);
  renderCards();
}

function selectVisibleCards() {
  pagedRows(filteredData()).forEach(({ id }) => S.selected.add(id));
  renderCards();
}

function pagedRows(rows) {
  if (!S.perPage) return rows;
  const start = S.page * S.perPage;
  return rows.slice(start, start + S.perPage);
}

function totalPages(total) {
  return S.perPage ? Math.max(1, Math.ceil(total / S.perPage)) : 1;
}

  const rows = pagedRows(allRows);

  main.innerHTML = '';

  // Results bar: count + per-page selector

  bar.className = 'results-bar';
  bar.innerHTML = `
    <p class="results-info">

          <option value="alpha"     ${S.sortMode==='alpha'     ?'selected':''}>${i('sortAlpha')}</option>
          <option value="alphaDesc" ${S.sortMode==='alphaDesc' ?'selected':''}>${i('sortAlphaDesc')}</option>
        </select>

        <label for="perPageSelect">${i('perPage')}</label>
        <select id="perPageSelect">

          <option value="25"  ${S.perPage===25  ?'selected':''}>25</option>

    card.className = 'card' + (fav ? ' is-fav' : '') + (shared ? ' is-shared' : '') + (selected ? ' is-selected' : '');
    const progIcon = item.programs.length
      ? `<span class="card-prog-icon" title="${item.programs.map(p => esc(p.label)).join(', ')}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>`
      : '';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${esc(item.name)}</div>

      <div class="card-fields">${item.fields.map(badgeHTML).join('')}</div>
      <div class="card-summary">${esc(item.summary)}</div>
    `;
    card.querySelector('.fav-star').onclick = e => { e.stopPropagation(); toggleFav(id, e.currentTarget); };
    card.onclick = () => { if (S.selectMode) toggleCardSelection(id); else openModal(id); };
    grid.appendChild(card);
  });

  main.appendChild(grid);

  // Pagination controls (only when perPage > 0 and more than one page)
  if (S.perPage && pages > 1) {

  }

function buildPagination(pages) {
  const wrap = document.createElement('div');
  wrap.className = 'pagination-bar';
  const p = S.page;

  const btn = (label, title, disabled, active, onclick) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.innerHTML = label;
    b.title = title;
    b.disabled = disabled;
    if (!disabled) b.onclick = onclick;
    return b;
  };

  const ellipsis = () => {
    const s = document.createElement('span');
    s.className = 'page-ellipsis';
    s.textContent = '…';
    return s;
  };

  wrap.appendChild(btn('«', i('pageFirst'), p === 0, false, () => { S.page = 0; renderCards(); window.scrollTo(0,0); }));
  wrap.appendChild(btn('‹', i('pagePrev'),  p === 0, false, () => { S.page--; renderCards(); window.scrollTo(0,0); }));

  // Page number buttons: always show first, last, current ±2, with ellipsis
  const show = new Set([0, pages - 1]);
  for (let n = Math.max(0, p - 2); n <= Math.min(pages - 1, p + 2); n++) show.add(n);
  const nums = [...show].sort((a, b) => a - b);

  let prev = -1;
  nums.forEach(n => {
    if (prev !== -1 && n - prev > 1) wrap.appendChild(ellipsis());
    wrap.appendChild(btn(n + 1, '', false, n === p, () => { S.page = n; renderCards(); window.scrollTo(0,0); }));
    prev = n;
  });

  wrap.appendChild(btn('›', i('pageNext'), p === pages - 1, false, () => { S.page++; renderCards(); window.scrollTo(0,0); }));
  wrap.appendChild(btn('»', i('pageLast'), p === pages - 1, false, () => { S.page = pages - 1; renderCards(); window.scrollTo(0,0); }));

  return wrap;
}

function printModal() {

  el.innerHTML = `
    <h1>${esc(item.name)}</h1>

  `;

function copyModal() {
  const item = S.modal ? itemById(S.modal) : null;
  if (!item) return;

  const meta = [item.blocks.join(', '), item.fields.join(', ')].filter(Boolean).join(' · ');
  const url = techniqueURL(item.id);
  const html = [
    `<h2>${esc(item.name)}</h2>`,
    meta ? `<p><em>${esc(meta)}</em></p>` : '',
    item.summary ? `<blockquote><p>${esc(item.summary)}</p></blockquote>` : '',
    item.desc ? formatDesc(item.desc) : '',
    `<p><a href="${esc(url)}">${esc(url)}</a></p>`,
  ].filter(Boolean).join('\n');

  const plain = [
    item.name,
    meta,
    item.summary ? '\n' + item.summary : '',
    item.desc ? '\n' + item.desc.replace(/## /g, '\n').trim() : '',
    '\n' + url,
  ].filter(Boolean).join('\n');

  const btn = document.getElementById('modalCopyBtn');
  const promise = (typeof ClipboardItem !== 'undefined')
    ? navigator.clipboard.write([new ClipboardItem({
        'text/html':  new Blob([html],  { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' }),
      })])
    : navigator.clipboard.writeText(plain);

  promise.then(() => {
    btn.style.color = 'var(--primary)';
    const origTitle = btn.title;
    btn.title = i('copied');
    setTimeout(() => { btn.style.color = ''; btn.title = origTitle; }, 2000);
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  S.modal = null;
  S.evalModal = null;
  S.modalHistory = [];
}

function renderEvalSection(item) {
