function mapApplyPanelCollapsed() {
  const panel = document.getElementById('mapNodePanel');
  const toggle = document.getElementById('mapPanelToggle');
  if (!panel || !toggle) return;
  panel.classList.toggle('collapsed', MAP.panelCollapsed);
  toggle.textContent = MAP.panelCollapsed ? '+' : '−';
  toggle.title = MAP.panelCollapsed ? i('mapPanelExpand') : i('mapPanelCollapse');
}

function mapSetPanelCollapsed(collapsed) {
  MAP.panelCollapsed = collapsed;
  MAP.panelCollapseManual = true;
  mapApplyPanelCollapsed();
  if (document.getElementById('mapNodePanel')?.classList.contains('visible')) mapPlacePanel(MAP.selected);
}

function mapShouldAutoCollapsePanel() {
  const panel = document.getElementById('mapNodePanel');
  const view  = document.getElementById('mapView');
  if (!panel || !view || !window.matchMedia('(max-width: 600px)').matches) return false;

  const savedCollapsed = MAP.panelCollapsed;
  const savedClass = panel.classList.contains('collapsed');
  MAP.panelCollapsed = false;
  panel.classList.remove('collapsed');
  mapPreparePanelForPositioning();

  const panelRect = panel.getBoundingClientRect();
  const viewRect  = view.getBoundingClientRect();
  const shouldCollapse = viewRect.height < 620 || panelRect.height > viewRect.height * 0.34;

  MAP.panelCollapsed = savedCollapsed;
  panel.classList.toggle('collapsed', savedClass);
  return shouldCollapse;
}

function mapSetupLegendDrag() {
  const legend = document.getElementById('mapLegend');
  const head   = legend?.querySelector('.map-legend-head');
  const view   = document.getElementById('mapView');
  if (!legend || !head || !view || head._mapDragAttached) return;
  head._mapDragAttached = true;

  head.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (e.target.closest('button, a, input, select, textarea')) return;
    if (legend.style.display === 'none') return;

    const legendRect = legend.getBoundingClientRect();
    const viewRect   = view.getBoundingClientRect();
    const pos = mapMoveLegendTo(legendRect.left - viewRect.left, legendRect.top - viewRect.top, true);
    if (!pos) return;

    MAP.legendDrag = {
      pointerId: e.pointerId,
      x0: e.clientX,
      y0: e.clientY,
      left0: pos.left,
      top0: pos.top,
    };
    legend.classList.add('is-dragging');
    head.setPointerCapture?.(e.pointerId);
    document.getElementById('mapTooltip').style.display = 'none';
    e.preventDefault();
    e.stopPropagation();
  });

  head.addEventListener('pointermove', e => {
    const drag = MAP.legendDrag;
    if (!drag || drag.pointerId !== e.pointerId) return;
    mapMoveLegendTo(drag.left0 + e.clientX - drag.x0, drag.top0 + e.clientY - drag.y0, true);
    e.preventDefault();
    e.stopPropagation();
  });

  const finishDrag = e => {
    const drag = MAP.legendDrag;
    if (!drag || drag.pointerId !== e.pointerId) return;
    MAP.legendDrag = null;
    legend.classList.remove('is-dragging');
    e.stopPropagation();
  };
  head.addEventListener('pointerup', finishDrag);
  head.addEventListener('pointercancel', finishDrag);
}

function mapSetupPanelDrag() {
  const panel = document.getElementById('mapNodePanel');
  const head  = panel?.querySelector('.map-panel-head');
  const view  = document.getElementById('mapView');
  if (!panel || !head || !view || head._mapDragAttached) return;
  head._mapDragAttached = true;

  head.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (e.target.closest('button, a, input, select, textarea')) return;
    if (!panel.classList.contains('visible')) return;

    const panelRect = panel.getBoundingClientRect();
    const viewRect  = view.getBoundingClientRect();
    const pos = mapMovePanelTo(panelRect.left - viewRect.left, panelRect.top - viewRect.top, true);
    if (!pos) return;

    MAP.panelDrag = {
      pointerId: e.pointerId,
      x0: e.clientX,
      y0: e.clientY,
      left0: pos.left,
      top0: pos.top,
    };
    panel.classList.add('is-dragging');
    head.setPointerCapture?.(e.pointerId);
    document.getElementById('mapTooltip').style.display = 'none';
    e.preventDefault();
    e.stopPropagation();
  });

  head.addEventListener('pointermove', e => {
    const drag = MAP.panelDrag;
    if (!drag || drag.pointerId !== e.pointerId) return;
    mapMovePanelTo(drag.left0 + e.clientX - drag.x0, drag.top0 + e.clientY - drag.y0, true);
    e.preventDefault();
    e.stopPropagation();
  });

  const finishDrag = e => {
    const drag = MAP.panelDrag;
    if (!drag || drag.pointerId !== e.pointerId) return;
    MAP.panelDrag = null;
    panel.classList.remove('is-dragging');
    e.stopPropagation();
  };
  head.addEventListener('pointerup', finishDrag);
  head.addEventListener('pointercancel', finishDrag);
}

function toggleMapView() {
  S.mapMode = !S.mapMode;
  const mapView = document.getElementById('mapView');
  const mainEl  = document.getElementById('main');
  const btn     = document.getElementById('mapViewBtn');

  if (S.mapMode) {
    // Compute offset below sticky header + navs
    const hdr    = document.querySelector('header');
    const blkNav = document.querySelector('.block-nav');
    const fldNav = document.querySelector('.field-nav');
    const banner = document.getElementById('sharedBanner');
    const topPx  = (hdr?.offsetHeight    || 0)
                 + (blkNav?.offsetHeight || 0)
                 + (fldNav?.offsetHeight || 0)
                 + (banner?.classList.contains('visible') ? (banner.offsetHeight || 0) : 0);
    mapView.style.top = topPx + 'px';
    mapView.style.display = 'block';
    mainEl.style.display  = 'none';
    btn.classList.add('active');
    document.body.classList.add('map-mode');
    document.getElementById('mapViewBtnLabel').textContent = i('mapViewClose');
    document.getElementById('selectBtn').style.display = 'none';
    document.getElementById('favBtn').style.display    = 'none';
    mapResizeCanvas();
    if (shouldOpenMapWithBlocks()) initMapBlocks();
    else initMapData();
    mapShowHint();
    mapStart();
  } else {
    mapStop();
    mapView.style.display = 'none';
    mainEl.style.display  = '';
    btn.classList.remove('active');
    document.body.classList.remove('map-mode');
    document.getElementById('mapViewBtnLabel').textContent = i('mapView');
    document.getElementById('selectBtn').style.display = '';
    document.getElementById('favBtn').style.display    = '';
    renderCards();
  }
}

function mapSetupEvents() {
  const canvas = mapCanvas();
  if (!canvas || canvas._mapEventsAttached) return;
  canvas._mapEventsAttached = true;

  // ── Mouse ──────────────────────────────────────────────────────────────────

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    const sx   = (e.clientX - rect.left) * dpr;
    const sy   = (e.clientY - rect.top)  * dpr;

    if (MAP.drag) {
      if (MAP.drag.isPan) {
        MAP.camera.x = MAP.drag.cx0 - (e.clientX - MAP.drag.mx0) / MAP.camera.scale;
        MAP.camera.y = MAP.drag.cy0 - (e.clientY - MAP.drag.my0) / MAP.camera.scale;
      } else {
        const nd = MAP.nodes[MAP.drag.ni];
        nd.x  = MAP.drag.nx0 + (e.clientX - MAP.drag.mx0) / MAP.camera.scale;
        nd.y  = MAP.drag.ny0 + (e.clientY - MAP.drag.my0) / MAP.camera.scale;
        nd.vx = 0; nd.vy = 0;
        MAP.alpha = Math.max(MAP.alpha, 0.3);
      }
      canvas.classList.add('dragging');
      return;
    }

    const hit = mapHitTest(sx, sy);
    if (hit !== MAP.hover) { MAP.hover = hit; }
    canvas.classList.toggle('hovering', hit >= 0);

    const tip = document.getElementById('mapTooltip');
    if (hit >= 0) {
      const nd = MAP.nodes[hit];
      document.getElementById('mapTipName').textContent    = nd.name;
      document.getElementById('mapTipSummary').textContent = nd.summary || '';
      tip.style.display = 'block';
      // Keep tooltip within viewport
      const tw = tip.offsetWidth  || 250;
      const th = tip.offsetHeight || 80;
      tip.style.left = Math.min(e.clientX + 14, window.innerWidth  - tw - 8) + 'px';
      tip.style.top  = Math.min(e.clientY - 10, window.innerHeight - th - 8) + 'px';
    } else {
      tip.style.display = 'none';
    }
  });

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    const sx   = (e.clientX - rect.left) * dpr;
    const sy   = (e.clientY - rect.top)  * dpr;
    const hit  = mapHitTest(sx, sy);
    if (hit >= 0) {
      const nd = MAP.nodes[hit];
      MAP.drag = { isPan: false, ni: hit, mx0: e.clientX, my0: e.clientY, nx0: nd.x, ny0: nd.y };
    } else {
      MAP.drag = { isPan: true, mx0: e.clientX, my0: e.clientY, cx0: MAP.camera.x, cy0: MAP.camera.y };
    }
    e.preventDefault();
  });

  canvas.addEventListener('mouseup', e => {
    if (MAP.drag) {
      const moved = Math.abs(e.clientX - MAP.drag.mx0) > 5 || Math.abs(e.clientY - MAP.drag.my0) > 5;
      if (!moved) {
        if (MAP.drag.isPan) {
          mapSelectNode(-1);
        } else if (MAP.viewMode === 'blocks') {
          const blockId = MAP.nodes[MAP.drag.ni].id;
          S.block = blockId; S.field = null; S.page = 0;
          renderBlockTabs(); renderTabs();
          initMapData();
        } else if (MAP.nodes[MAP.drag.ni]?.ghost) {
          const targetId   = MAP.nodes[MAP.drag.ni].id;
          const ghostItem  = itemById(targetId);
          if (ghostItem) {
            S.block = ghostItem.blockIds[0] || null;
            S.field = null; S.page = 0;
            renderBlockTabs(); renderTabs();
            initMapData();
            requestAnimationFrame(() => {
              const ni = MAP.nodes.findIndex(n => n.id === targetId);
              if (ni >= 0) mapSelectNode(ni);
            });
          }
        } else {
          mapSelectNode(MAP.drag.ni);
        }
      }
    }
    MAP.drag = null;
    canvas.classList.remove('dragging');
  });

  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    const hit  = mapHitTest((e.clientX - rect.left) * dpr, (e.clientY - rect.top) * dpr);
    if (hit >= 0) openModal(MAP.nodes[hit].id);
  });

  canvas.addEventListener('mouseleave', () => {
    MAP.drag  = null;
    MAP.hover = -1;
    document.getElementById('mapTooltip').style.display = 'none';
    canvas.classList.remove('dragging', 'hovering');
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const rect   = canvas.getBoundingClientRect();
    const dpr    = window.devicePixelRatio || 1;
    const mx     = (e.clientX - rect.left) * dpr;
    const my     = (e.clientY - rect.top)  * dpr;
    const c      = canvas;
    // Zoom toward cursor
    const wx = (mx - c.width  / 2) / MAP.camera.scale + MAP.camera.x;
    const wy = (my - c.height / 2) / MAP.camera.scale + MAP.camera.y;
    MAP.camera.scale = Math.max(0.12, Math.min(6, MAP.camera.scale * factor));
    MAP.camera.x     = wx - (mx - c.width  / 2) / MAP.camera.scale;
    MAP.camera.y     = wy - (my - c.height / 2) / MAP.camera.scale;
  }, { passive: false });

  // ── Touch ──────────────────────────────────────────────────────────────────

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t    = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const dpr  = window.devicePixelRatio || 1;
      const sx   = (t.clientX - rect.left) * dpr;
      const sy   = (t.clientY - rect.top)  * dpr;
      const hit  = mapHitTest(sx, sy);
      if (hit >= 0) {
        const nd = MAP.nodes[hit];
        MAP.drag = { isPan: false, ni: hit, mx0: t.clientX, my0: t.clientY, nx0: nd.x, ny0: nd.y };
      } else {
        MAP.drag = { isPan: true, mx0: t.clientX, my0: t.clientY, cx0: MAP.camera.x, cy0: MAP.camera.y };
      }
    } else if (e.touches.length === 2) {
      MAP.drag = null;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      MAP.lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (MAP.lastPinchDist > 0) {
        MAP.camera.scale = Math.max(0.12, Math.min(6, MAP.camera.scale * dist / MAP.lastPinchDist));
      }
      MAP.lastPinchDist = dist;
    } else if (e.touches.length === 1 && MAP.drag) {
      const t = e.touches[0];
      if (MAP.drag.isPan) {
        MAP.camera.x = MAP.drag.cx0 - (t.clientX - MAP.drag.mx0) / MAP.camera.scale;
        MAP.camera.y = MAP.drag.cy0 - (t.clientY - MAP.drag.my0) / MAP.camera.scale;
      } else {
        const nd = MAP.nodes[MAP.drag.ni];
        nd.x  = MAP.drag.nx0 + (t.clientX - MAP.drag.mx0) / MAP.camera.scale;
        nd.y  = MAP.drag.ny0 + (t.clientY - MAP.drag.my0) / MAP.camera.scale;
        nd.vx = 0; nd.vy = 0;
        MAP.alpha = Math.max(MAP.alpha, 0.3);
      }
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && MAP.drag) {
      const t     = e.changedTouches[0];
      const moved = Math.abs(t.clientX - MAP.drag.mx0) > 8 || Math.abs(t.clientY - MAP.drag.my0) > 8;
      if (!moved) {
        const now = Date.now();
        const isDoubleTap = (now - MAP.lastTapTime) < 350 && !MAP.drag.isPan;
        MAP.lastTapTime = now;
        if (isDoubleTap && MAP.viewMode === 'techniques') {
          openModal(MAP.nodes[MAP.drag.ni].id);
        } else if (MAP.drag.isPan) {
          mapSelectNode(-1);
        } else if (MAP.viewMode === 'blocks') {
          const blockId = MAP.nodes[MAP.drag.ni].id;
          S.block = blockId; S.field = null; S.page = 0;
          renderBlockTabs(); renderTabs();
          initMapData();
        } else if (MAP.nodes[MAP.drag.ni]?.ghost) {
          const targetId   = MAP.nodes[MAP.drag.ni].id;
          const ghostItem  = itemById(targetId);
          if (ghostItem) {
            S.block = ghostItem.blockIds[0] || null;
            S.field = null; S.page = 0;
            renderBlockTabs(); renderTabs();
            initMapData();
            requestAnimationFrame(() => {
              const ni = MAP.nodes.findIndex(n => n.id === targetId);
              if (ni >= 0) mapSelectNode(ni);
            });
          }
        } else {
          mapSelectNode(MAP.drag.ni);
        }
      }
    }
    MAP.drag = null;
    MAP.lastPinchDist = 0;
    e.preventDefault();
  }, { passive: false });

  // ── Hide hint on any click while map is active ──────────────────────────────
  document.addEventListener('click', () => {
    if (S.mapMode && (Date.now() - (MAP.hintShownAt || 0)) > 300) mapHideHint();
  });

  // ── Resize ─────────────────────────────────────────────────────────────────

  window.addEventListener('resize', () => {
    if (!S.mapMode) return;
    // Recompute top offset
    const hdr    = document.querySelector('header');
    const blkNav = document.querySelector('.block-nav');
    const fldNav = document.querySelector('.field-nav');
    const banner = document.getElementById('sharedBanner');
    const topPx  = (hdr?.offsetHeight    || 0)
                 + (blkNav?.offsetHeight || 0)
                 + (fldNav?.offsetHeight || 0)
                 + (banner?.classList.contains('visible') ? (banner.offsetHeight || 0) : 0);
    document.getElementById('mapView').style.top = topPx + 'px';
    mapResizeCanvas();
    if (document.getElementById('mapNodePanel')?.classList.contains('visible')) {
      if (!MAP.panelCollapseManual) {
        MAP.panelCollapsed = mapShouldAutoCollapsePanel();
        mapApplyPanelCollapsed();
      }
      mapPlacePanel(MAP.selected);
    }
    mapPlaceLegend();
  });

  // ── Theme change: redraw ────────────────────────────────────────────────────
  new MutationObserver(() => { if (S.mapMode) mapDraw(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

// ─── EVAL GRAPH ENGINE ───────────────────────────────────────────────────────

// Physics & sizing constants
const EG = {
  REPULSION:  120000,
  IDEAL_LEN:  160,
  ATTRACTION: 0.018,
  DAMPING:    0.76,
  GRAVITY:    0.001,
  STRATIFY:   0.045,
  COLUMN_X:   320,
  COOLING:    0.98,
  STOP_ALPHA: 0.001,
  CENTER_R:   26,
  NODE_R:     21,
  NODE_R2:    13,
  LABEL_H:    72,
};

// Color palette — matches the eval chip colors
const EGPAL = {
  light: {
    TEC: { bg: '#dbeafe', edge: '#93c5fd', stroke: '#2563EB', text: '#1D4ED8' },
    INS: { bg: '#dcfce7', edge: '#4ade80', stroke: '#16a34a', text: '#15803d' },
    HER: { bg: '#f3e8ff', edge: '#c084fc', stroke: '#9333ea', text: '#7e22ce' },
    DIM: { bg: '#fef3c7', edge: '#fbbf24', stroke: '#d97706', text: '#b45309' },
  },
  dark: {
    TEC: { bg: 'rgba(37,99,235,0.15)',   edge: '#3b82f6', stroke: '#60a5fa', text: '#93c5fd' },
    INS: { bg: 'rgba(22,163,74,0.15)',   edge: '#22c55e', stroke: '#4ade80', text: '#86efac' },
    HER: { bg: 'rgba(147,51,234,0.15)',  edge: '#a855f7', stroke: '#c084fc', text: '#d8b4fe' },
    DIM: { bg: 'rgba(217,119,6,0.15)',   edge: '#f59e0b', stroke: '#fbbf24', text: '#fde68a' },
  },
};

// Relation definitions (field names in metaceval JSON schema)
const EVAL_RELATIONS = {
  tecnicas:     { left: null,
                  right: { cat: 'instrumentos', field: 'related_instruments', metaKey: 'rel_ins' } },
  dimensiones:  { left: null,
                  right: { cat: 'instrumentos', field: 'related_instruments', metaKey: 'rel_ins' } },
  instrumentos: { left:  { cat: 'tecnicas',     field: 'related_tecnicas',    metaKey: 'rel_tec' },
                  right: { cat: 'herramientas', field: 'related_tools',       metaKey: 'rel_her' } },
  herramientas: { left:  { cat: 'instrumentos', field: 'related_instruments', metaKey: 'rel_ins' },
                  right: null },
};
const EVAL_DIM_REL  = { cat: 'dimensiones', field: 'related_dimensions', metaKey: 'rel_dim' };
const EVAL_REL_PRI  = { principal: 3, complementaria: 2, ocasional: 1 };

// Graph state
const EGRAPH = {
  nodes: [], edges: [], rawNodes: [], rawEdges: [],
  hover: -1, alpha: 1, raf: null, canvas: null,
  camera: { x: 0, y: 0, scale: 1 },
  expanded: false,
  isPanning: false, panMoved: false,
  panStart: { x: 0, y: 0 }, camStart: { x: 0, y: 0 },
  dragNode: -1,
  currentEntity: null, currentCat: null,
};

function evalGraphStop() {
  if (EGRAPH.raf !== null) { cancelAnimationFrame(EGRAPH.raf); EGRAPH.raf = null; }
}

function evalFindByIds(ids, cat) {
  if (!ids || !ids.length || !EV.data[S.lang]) return [];
  const items = EV.data[S.lang][cat] || [];
  return ids.map(id => items.find(e => e.id === id)).filter(Boolean);
}

function evalGetRelKind(item, metaKey, targetId) {
  return item.rel_meta?.[metaKey]?.[targetId] || 'complementaria';
}

function evalGraphBuild(entity, cat) {
  const prefix = evalEntityPrefix(entity.id);
  const nodes = [];
  const edges = [];
  const idToIdx = new Map();

  nodes.push({
    x: 0, y: 0, vx: 0, vy: 0,
    r: EG.CENTER_R, prefix, cat,
    name: entity.name, id: entity.id, isCenter: true, targetX: 0,
  });
  idToIdx.set(entity.id, 0);

  function kindRadius(base, kind) {
    if (kind === 'complementaria') return Math.round(base * 0.65);
    if (kind === 'ocasional')      return Math.max(4, Math.round(base * 0.40));
    return base;
  }

  function addEdge(ai, bi, kind) {
    const ex = edges.find(e => (e.a === ai && e.b === bi) || (e.a === bi && e.b === ai));
    if (ex) { if (EVAL_REL_PRI[kind] > EVAL_REL_PRI[ex.kind]) ex.kind = kind; return; }
    const trans = nodes[ai]?.cat === 'dimensiones' || nodes[bi]?.cat === 'dimensiones';
    edges.push({ a: ai, b: bi, kind, isTransversal: trans });
  }

  function addConnected(srcEntity, relDef, parentIdx, targetX, baseR) {
    if (!relDef) return [];
    const connected = evalFindByIds(srcEntity[relDef.field] || [], relDef.cat);
    const result = [];
    connected.forEach((ni, k) => {
      const kind = evalGetRelKind(srcEntity, relDef.metaKey, ni.id);
      const r    = kindRadius(baseR, kind);
      let nodeIdx = idToIdx.get(ni.id);
      if (nodeIdx === undefined) {
        const spread = connected.length > 1 ? (k - (connected.length - 1) / 2) * 220 : 0;
        nodeIdx = nodes.length;
        idToIdx.set(ni.id, nodeIdx);
        nodes.push({
          x: targetX + (Math.random() - 0.5) * 60,
          y: spread  + (Math.random() - 0.5) * 30,
          vx: 0, vy: 0,
          r, baseR, kindPriority: EVAL_REL_PRI[kind],
          prefix: evalEntityPrefix(ni.id), cat: relDef.cat,
          name: ni.name, id: ni.id, isCenter: false, targetX,
        });
      } else if (!nodes[nodeIdx].isCenter && EVAL_REL_PRI[kind] > (nodes[nodeIdx].kindPriority || 0)) {
        nodes[nodeIdx].r            = kindRadius(nodes[nodeIdx].baseR, kind);
        nodes[nodeIdx].kindPriority = EVAL_REL_PRI[kind];
      }
      result.push({ idx: nodeIdx, entity: ni, cat: relDef.cat });
      addEdge(parentIdx, nodeIdx, kind);
    });
    return result;
  }

  const L1 = EG.COLUMN_X, L2 = EG.COLUMN_X * 2.0, L3 = EG.COLUMN_X * 2.7;

  if (cat === 'instrumentos') {
    addConnected(entity, EVAL_RELATIONS[cat].left,  0, -L1, EG.NODE_R);
    addConnected(entity, EVAL_DIM_REL,              0, -L1, EG.NODE_R);
    const tools = addConnected(entity, EVAL_RELATIONS[cat].right, 0, L1, EG.NODE_R);
    if (EGRAPH.expanded) {
      tools.forEach(({ idx, entity: ni, cat: nc }) =>
        addConnected(ni, EVAL_DIM_REL, idx, L2, EG.NODE_R2)
      );
    }
  } else if (cat === 'tecnicas' || cat === 'dimensiones') {
    addConnected(entity, EVAL_DIM_REL, 0, -L1, EG.NODE_R);
    const l1 = addConnected(entity, EVAL_RELATIONS[cat].right, 0, L1, EG.NODE_R);
    l1.forEach(({ idx, entity: ni, cat: nc }) =>
      addConnected(ni, EVAL_RELATIONS[nc]?.right, idx, L2, EG.NODE_R2)
    );
    if (EGRAPH.expanded) {
      l1.forEach(({ idx, entity: ni, cat: nc }) => {
        addConnected(ni, EVAL_RELATIONS[nc]?.left, idx, L2, EG.NODE_R2);
        addConnected(ni, EVAL_DIM_REL, idx, L2, EG.NODE_R2);
      });
    }
  } else { // herramientas
    addConnected(entity, EVAL_DIM_REL, 0, L1, EG.NODE_R);
    const l1 = addConnected(entity, EVAL_RELATIONS[cat].left, 0, -L1, EG.NODE_R);
    l1.forEach(({ idx, entity: ni, cat: nc }) =>
      addConnected(ni, EVAL_RELATIONS[nc]?.left, idx, -L2, EG.NODE_R2)
    );
    if (EGRAPH.expanded) {
      l1.forEach(({ idx, entity: ni, cat: nc }) => {
        addConnected(ni, EVAL_DIM_REL, idx, L1, EG.NODE_R2);
        addConnected(ni, EVAL_RELATIONS[nc]?.right, idx, -L3, EG.NODE_R2);
      });
    }
  }

  // Filter optional edges
  const visEdges = EGRAPH.showOccasional
    ? edges : edges.filter(e => e.kind !== 'ocasional');
  const reachable = new Set([0]);
  let changed = true;
  while (changed) {
    changed = false;
    visEdges.forEach(e => {
      if (reachable.has(e.a) && !reachable.has(e.b)) { reachable.add(e.b); changed = true; }
      if (reachable.has(e.b) && !reachable.has(e.a)) { reachable.add(e.a); changed = true; }
    });
  }
  const idxMap = new Map();
  const keptNodes = [];
  nodes.forEach((nd, i) => {
    if (!reachable.has(i)) return;
    idxMap.set(i, keptNodes.length);
    keptNodes.push(nd);
  });
  const keptEdges = visEdges
    .filter(e => reachable.has(e.a) && reachable.has(e.b))
    .map(e => ({ ...e, a: idxMap.get(e.a), b: idxMap.get(e.b) }));

  EGRAPH.rawNodes = nodes;
  EGRAPH.rawEdges = edges;
  EGRAPH.nodes    = keptNodes;
  EGRAPH.edges    = keptEdges;
  EGRAPH.alpha    = 1;
  EGRAPH.hover    = -1;
  EGRAPH.camera   = { x: 0, y: 0, scale: 1 };
}

function evalGraphTick() {
  const { nodes, edges } = EGRAPH;
  const n = nodes.length;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      const d2 = dx * dx + dy * dy || 0.01, d = Math.sqrt(d2);
      const f  = (EG.REPULSION * EGRAPH.alpha) / d2;
      dx /= d; dy /= d;
      nodes[i].vx -= dx * f; nodes[i].vy -= dy * f;
      nodes[j].vx += dx * f; nodes[j].vy += dy * f;
    }
  }
  edges.forEach(({ a, b }) => {
    const na = nodes[a], nb = nodes[b];
    const dx = nb.x - na.x, dy = nb.y - na.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
    const f  = (d - EG.IDEAL_LEN) * EG.ATTRACTION;
    const ux = dx / d, uy = dy / d;
    na.vx += ux * f; na.vy += uy * f;
    nb.vx -= ux * f; nb.vy -= uy * f;
  });
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const ni = nodes[i], nj = nodes[j];
      const dx = nj.x - ni.x, dy = nj.y - ni.y;
      const d2 = dx * dx + dy * dy || 0.01;
      const minD = ni.r + nj.r + EG.LABEL_H;
      if (d2 < minD * minD) {
        const d = Math.sqrt(d2), push = (minD - d) / d * 0.5;
        ni.vx -= dx * push; ni.vy -= dy * push;
        nj.vx += dx * push; nj.vy += dy * push;
      }
    }
  }
  nodes.forEach((nd, i) => {
    if (i === 0 || nd.fixed) { nd.vx = 0; nd.vy = 0; return; }
    nd.vx += (nd.targetX - nd.x) * EG.STRATIFY;
    nd.vy -= nd.y * EG.GRAVITY;
    nd.vx *= EG.DAMPING; nd.vy *= EG.DAMPING;
    nd.x  += nd.vx;      nd.y  += nd.vy;
  });
  EGRAPH.alpha *= EG.COOLING;
}

function evalGraphWrapLabel(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const t = line ? line + ' ' + w : w;
    if (line && ctx.measureText(t).width > maxW) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines.slice(0, 2);
}

function evalGraphDraw() {
  const canvas = EGRAPH.canvas;
  if (!canvas) return;
  evalGraphResizeCanvas();
  const dpr  = window.devicePixelRatio || 1;
  const ctx  = canvas.getContext('2d');
  const cw   = canvas.width, ch = canvas.height;
  const w    = cw / dpr, h = ch / dpr;
  const dark = document.documentElement.dataset.theme === 'dark';
  const pal  = dark ? EGPAL.dark : EGPAL.light;
  const hov  = EGRAPH.hover;
  const cam  = EGRAPH.camera;

  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.translate(w / 2, h / 2);
  ctx.scale(cam.scale, cam.scale);
  ctx.translate(-cam.x, -cam.y);

  EGRAPH.edges.forEach(({ a, b, isTransversal }) => {
    const na = EGRAPH.nodes[a], nb = EGRAPH.nodes[b];
    const col = isTransversal ? pal.DIM : pal[nb.prefix];
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = (col?.edge || '#999') + (dark ? '88' : '66');
    ctx.lineWidth   = 2;
    ctx.stroke();
  });

  EGRAPH.nodes.forEach((nd, i) => {
    const col   = pal[nd.prefix] || pal.INS;
    const isHov = i === hov && !nd.isCenter;
    const r     = isHov ? nd.r + 2 : nd.r;
    const alpha = nd.isCenter ? 1
      : nd.kindPriority === 3 ? 1
      : nd.kindPriority === 2 ? 0.65 : 0.40;

    ctx.save();
    ctx.globalAlpha = isHov ? Math.min(1, alpha + 0.2) : alpha;
    ctx.beginPath();
    ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2);
    ctx.fillStyle   = col.bg;
    ctx.fill();
    ctx.lineWidth   = nd.isCenter ? 2.5 : isHov ? 2.2 : 1.5;
    ctx.strokeStyle = nd.isCenter || isHov ? col.stroke : col.edge;
    ctx.stroke();
    ctx.restore();

    const fs   = nd.isCenter ? 13 : 11;
    const maxW = nd.isCenter ? 160 : 140;
    const lineH = fs + 2;
    const pad   = 3;
    ctx.font         = `${nd.isCenter ? 700 : 500} ${fs}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    const lines = evalGraphWrapLabel(ctx, nd.name, maxW);
    lines.forEach((line, li) => {
      const tw = ctx.measureText(line).width;
      const tx = nd.x, ty = nd.y + r + 4 + li * lineH;
      ctx.fillStyle = dark ? 'rgba(15,23,42,0.82)' : 'rgba(255,255,255,0.88)';
      ctx.fillRect(tx - tw / 2 - pad, ty - 1, tw + pad * 2, fs + 3);
      ctx.fillStyle = col.text;
      ctx.fillText(line, tx, ty);
    });
  });

  ctx.restore();
}

function evalGraphResizeCanvas() {
  const canvas = EGRAPH.canvas;
  if (!canvas || !canvas.clientWidth) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(canvas.clientWidth  * dpr);
  canvas.height = Math.round(canvas.clientHeight * dpr);
}

function evalGraphHitTest(sx, sy) {
  const canvas = EGRAPH.canvas;
  if (!canvas) return -1;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const cam = EGRAPH.camera;
  const wx = (sx - w / 2) / cam.scale + cam.x;
  const wy = (sy - h / 2) / cam.scale + cam.y;
  for (let i = EGRAPH.nodes.length - 1; i >= 0; i--) {
    const nd = EGRAPH.nodes[i];
    const dx = wx - nd.x, dy = wy - nd.y;
    if (dx * dx + dy * dy <= (nd.r + 4) * (nd.r + 4)) return i;
  }
  return -1;
}

function evalGraphLoop() {
  if (EGRAPH.alpha > EG.STOP_ALPHA) evalGraphTick();
  evalGraphDraw();
  EGRAPH.raf = requestAnimationFrame(evalGraphLoop);
}

function openEvalMap(entity, cat) {
  evalGraphStop();
  EGRAPH.currentEntity = entity;
  EGRAPH.currentCat    = cat;

  const view   = document.getElementById('evalMapView');
  const canvas = document.getElementById('evalMapCanvas');
  EGRAPH.canvas = canvas;

  // Position below sticky bars
  const hdr  = document.querySelector('header');
  const vTog = document.getElementById('viewToggle');
  const top  = (hdr?.offsetHeight || 0) + (vTog?.offsetHeight || 0);
  view.style.top = top + 'px';
  view.style.display = 'flex';

  // Label
  const lbl = document.getElementById('evalMapTitle');
  if (lbl) lbl.textContent = entity.name;

  evalGraphBuild(entity, cat);
  requestAnimationFrame(() => {
    evalGraphResizeCanvas();
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    EGRAPH.camera = { x: 0, y: ch / 2 - ch / 2, scale: 1 };
    evalGraphLoop();
  });
  document.body.style.overflow = 'hidden';
}

function closeEvalMap() {
  evalGraphStop();
  document.getElementById('evalMapView').style.display = 'none';
  document.body.style.overflow = '';
}

function initEvalMapEvents() {
  const canvas = document.getElementById('evalMapCanvas');
  const view   = document.getElementById('evalMapView');
  if (!canvas || !view) return;

  // Close button
  document.getElementById('evalMapCloseBtn').onclick = closeEvalMap;

  // 2nd-level toggle
  const expBtn = document.getElementById('evalMapExpandBtn');
  if (expBtn) {
    expBtn.onclick = () => {
      EGRAPH.expanded = !EGRAPH.expanded;
      expBtn.classList.toggle('active', EGRAPH.expanded);
      if (EGRAPH.currentEntity) evalGraphBuild(EGRAPH.currentEntity, EGRAPH.currentCat);
    };
  }

  // Fit button
  document.getElementById('evalMapFitBtn').onclick = () => {
    if (!EGRAPH.nodes.length) return;
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    EGRAPH.camera = { x: 0, y: 0, scale: 1 };
    evalGraphDraw();
  };

  // Pointer events: pan + drag
  let pointers = new Map();
  let lastPinchDist = 0;

  canvas.addEventListener('pointermove', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    if (EGRAPH.dragNode >= 1) {
      const dpr = window.devicePixelRatio || 1;
      const cam = EGRAPH.camera;
      const w = canvas.width / dpr, h = canvas.height / dpr;
      const nd = EGRAPH.nodes[EGRAPH.dragNode];
      nd.x = (sx - w / 2) / cam.scale + cam.x;
      nd.y = (sy - h / 2) / cam.scale + cam.y;
      nd.vx = 0; nd.vy = 0; nd.fixed = true;
      if (EGRAPH.alpha < 0.1) EGRAPH.alpha = 0.1;
      return;
    }
    if (EGRAPH.isPanning && pointers.size === 1) {
      const dx = e.clientX - EGRAPH.panStart.x;
      const dy = e.clientY - EGRAPH.panStart.y;
      EGRAPH.camera.x = EGRAPH.camStart.x - dx / EGRAPH.camera.scale;
      EGRAPH.camera.y = EGRAPH.camStart.y - dy / EGRAPH.camera.scale;
      EGRAPH.panMoved = true;
      return;
    }
    const hit = evalGraphHitTest(sx, sy);
    if (hit !== EGRAPH.hover) {
      EGRAPH.hover = hit;
      canvas.classList.toggle('hovering', hit >= 0);
    }
  });

  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, e);
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const hit = evalGraphHitTest(sx, sy);
    if (hit >= 1) {
      EGRAPH.dragNode = hit;
    } else {
      EGRAPH.isPanning = true;
      EGRAPH.panMoved  = false;
      EGRAPH.panStart  = { x: e.clientX, y: e.clientY };
      EGRAPH.camStart  = { ...EGRAPH.camera };
    }
  });

  const finishPtr = e => {
    pointers.delete(e.pointerId);
    if (EGRAPH.dragNode >= 1) {
      EGRAPH.nodes[EGRAPH.dragNode].fixed = false;
      EGRAPH.dragNode = -1;
    } else if (!EGRAPH.panMoved) {
      const rect = canvas.getBoundingClientRect();
      const hit = evalGraphHitTest(e.clientX - rect.left, e.clientY - rect.top);
      if (hit >= 0 && !EGRAPH.nodes[hit].isCenter) {
        const nd = EGRAPH.nodes[hit];
        closeEvalMap();
        openEvalModal(nd.id);
      }
    }
    EGRAPH.isPanning = false;
    EGRAPH.panMoved  = false;
  };
  canvas.addEventListener('pointerup',     finishPtr);
  canvas.addEventListener('pointercancel', finishPtr);

  // Pinch zoom
  canvas.addEventListener('pointermove', e => {
    pointers.set(e.pointerId, e);
    if (pointers.size === 2) {
      const pts = [...pointers.values()];
      const dx = pts[0].clientX - pts[1].clientX;
      const dy = pts[0].clientY - pts[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastPinchDist) {
        EGRAPH.camera.scale *= dist / lastPinchDist;
        EGRAPH.camera.scale  = Math.max(0.2, Math.min(4, EGRAPH.camera.scale));
      }
      lastPinchDist = dist;
    } else {
      lastPinchDist = 0;
    }
  });

  // Wheel zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    EGRAPH.camera.scale = Math.max(0.2, Math.min(4, EGRAPH.camera.scale * factor));
  }, { passive: false });

  // Theme change → redraw
  new MutationObserver(() => { if (EGRAPH.raf) evalGraphDraw(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

// ─── UNIFIED MAP (all nodes: metac + eval) ────────────────────────────────────

// Physics constants for the big graph (330 nodes)
const EU = {
  REPULSION:  55000,
  IDEAL_LEN:  110,
  ATTRACTION: 0.006,
  DAMPING:    0.82,
  GRAVITY:    0,
  COOLING:    0.985,
  STOP_ALPHA: 0.005,
  NODE_R:     12,
  LABEL_H:    52,
};

// Palette: extend EGPAL with METAC
EGPAL.light.METAC = { bg: '#f1f5f9', edge: '#94a3b8', stroke: '#64748b', text: '#334155' };
EGPAL.dark.METAC  = { bg: 'rgba(100,116,139,0.18)', edge: '#475569', stroke: '#94a3b8', text: '#cbd5e1' };

const UMAP = {
  nodes: [], edges: [],
  hover: -1, alpha: 1, raf: null, canvas: null,
  camera: { x: 0, y: 0, scale: 0.25 },
  isPanning: false, panMoved: false,
  panStart: { x: 0, y: 0 }, camStart: { x: 0, y: 0 },
  vis: { METAC: true, TEC: true, INS: true, HER: true, DIM: true },
  onlyPrincipal: false,
};

// Pre-position centres per type (keeps clusters visually separated)
const UMAP_CENTRES = {
  METAC: { x: -700, y:    0 },
  TEC:   { x:    0, y: -500 },
  INS:   { x:  600, y:    0 },
  HER:   { x:  400, y:  500 },
  DIM:   { x: -200, y:  550 },
};

function umapStop() {
  if (UMAP.raf !== null) { cancelAnimationFrame(UMAP.raf); UMAP.raf = null; }
}

function umapBuild() {
  const nodes = [];
  const edges = [];
  const idToIdx = new Map();

  function addNode(id, name, prefix) {
    if (!UMAP.vis[prefix]) return -1;
    if (idToIdx.has(id)) return idToIdx.get(id);
    const c = UMAP_CENTRES[prefix] || { x: 0, y: 0 };
    const angle = Math.random() * Math.PI * 2;
    const spread = 220;
    const idx = nodes.length;
    idToIdx.set(id, idx);
    nodes.push({
      x: c.x + Math.cos(angle) * spread * Math.random(),
      y: c.y + Math.sin(angle) * spread * Math.random(),
      vx: 0, vy: 0,
      r: EU.NODE_R, baseR: EU.NODE_R,
      prefix, name, id, kindPriority: 2, isCenter: false, fixed: false,
    });
    return idx;
  }

  function addEdge(ai, bi, kind, isCross) {
    if (ai < 0 || bi < 0) return;
    const ex = edges.find(e => (e.a === ai && e.b === bi) || (e.a === bi && e.b === ai));
    if (ex) return;
    edges.push({ a: ai, b: bi, kind, isCross });
  }

  // ── Add eval entities ──
  const evalMap = [
    { cat: 'tecnicas',    prefix: 'TEC' },
    { cat: 'instrumentos',prefix: 'INS' },
    { cat: 'herramientas',prefix: 'HER' },
    { cat: 'dimensiones', prefix: 'DIM' },
  ];
  evalMap.forEach(({ cat, prefix }) => {
    (EV.data[S.lang]?.[cat] || []).forEach(e => addNode(e.id, e.name, prefix));
  });

  // ── Add metac techniques ──
  (S.data[S.lang] || []).forEach(t => addNode(t.id, t.name, 'METAC'));

  // ── Intra-eval edges ──
  const addEvalEdges = (items, relField, tgtPrefix) => {
    items.forEach(e => {
      const ai = idToIdx.get(e.id);
      if (ai === undefined) return;
      (e[relField] || []).forEach(tid => {
        const bi = idToIdx.get(tid);
        if (bi === undefined) return;
        const kind = e.rel_meta?.[
          relField === 'related_instruments' ? 'rel_ins'
          : relField === 'related_tools'     ? 'rel_her'
          : relField === 'related_tecnicas'  ? 'rel_tec'
          : 'rel_dim'
        ]?.[tid] || 'complementaria';
        if (UMAP.onlyPrincipal && kind !== 'principal') return;
        addEdge(ai, bi, kind, false);
      });
    });
  };
  const ev = EV.data[S.lang] || {};
  addEvalEdges(ev.tecnicas    || [], 'related_instruments', 'INS');
  addEvalEdges(ev.instrumentos|| [], 'related_tools',       'HER');
  addEvalEdges(ev.instrumentos|| [], 'related_tecnicas',    'TEC');
  addEvalEdges(ev.instrumentos|| [], 'related_dimensions',  'DIM');
  addEvalEdges(ev.herramientas|| [], 'related_instruments', 'INS');
  addEvalEdges(ev.herramientas|| [], 'related_dimensions',  'DIM');
  addEvalEdges(ev.dimensiones || [], 'related_instruments', 'INS');

  // ── metac ↔ eval edges ──
  (S.data[S.lang] || []).forEach(t => {
    const ai = idToIdx.get(t.id);
    if (ai === undefined) return;
    (t.eval_ids || []).forEach(eid => {
      const bi = idToIdx.get(eid);
      if (bi === undefined) return;
      if (UMAP.onlyPrincipal) return; // metac links don't have principal/complementaria
      addEdge(ai, bi, 'complementaria', true);
    });
  });

  UMAP.nodes = nodes;
  UMAP.edges = edges;
  UMAP.alpha = 1;
  UMAP.hover = -1;
}

function umapTick() {
  const { nodes, edges } = UMAP;
  const n = nodes.length;
  const alpha = UMAP.alpha;

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      const d2 = dx * dx + dy * dy || 0.01, d = Math.sqrt(d2);
      const f = (EU.REPULSION * alpha) / d2;
      dx /= d; dy /= d;
      nodes[i].vx -= dx * f; nodes[i].vy -= dy * f;
      nodes[j].vx += dx * f; nodes[j].vy += dy * f;
    }
  }

  edges.forEach(({ a, b }) => {
    const na = nodes[a], nb = nodes[b];
    const dx = nb.x - na.x, dy = nb.y - na.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 0.01;
    const f  = (d - EU.IDEAL_LEN) * EU.ATTRACTION;
    const ux = dx / d, uy = dy / d;
    na.vx += ux * f; na.vy += uy * f;
    nb.vx -= ux * f; nb.vy -= uy * f;
  });

  // Separation
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const ni = nodes[i], nj = nodes[j];
      const dx = nj.x - ni.x, dy = nj.y - ni.y;
      const d2 = dx * dx + dy * dy || 0.01;
      const minD = ni.r + nj.r + EU.LABEL_H;
      if (d2 < minD * minD) {
        const d = Math.sqrt(d2), push = (minD - d) / d * 0.3;
        ni.vx -= dx * push; ni.vy -= dy * push;
        nj.vx += dx * push; nj.vy += dy * push;
      }
    }
  }

  nodes.forEach(nd => {
    if (nd.fixed) { nd.vx = 0; nd.vy = 0; return; }
    nd.vx *= EU.DAMPING; nd.vy *= EU.DAMPING;
    nd.x  += nd.vx;      nd.y  += nd.vy;
  });

  UMAP.alpha *= EU.COOLING;
}

function umapDraw() {
  const canvas = UMAP.canvas;
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  canvas.width  = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  const ctx = canvas.getContext('2d');
  const dark = document.documentElement.dataset.theme === 'dark';
  const pal  = dark ? EGPAL.dark : EGPAL.light;
  const cam  = UMAP.camera;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.translate(cw / 2, ch / 2);
  ctx.scale(cam.scale, cam.scale);
  ctx.translate(-cam.x, -cam.y);

  // Edges
  UMAP.edges.forEach(({ a, b, isCross }) => {
    const na = UMAP.nodes[a], nb = UMAP.nodes[b];
    const col = pal[nb.prefix] || pal.METAC;
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = (col.edge || '#999') + (isCross ? (dark ? '30' : '28') : (dark ? '55' : '44'));
    ctx.lineWidth = isCross ? 0.8 : 1.5;
    ctx.stroke();
  });

  // Nodes
  const hov = UMAP.hover;
  UMAP.nodes.forEach((nd, i) => {
    const col   = pal[nd.prefix] || pal.METAC;
    const isHov = i === hov;
    const r     = isHov ? nd.r + 2 : nd.r;

    ctx.save();
    ctx.globalAlpha = isHov ? 1 : 0.88;
    ctx.beginPath();
    ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2);
    ctx.fillStyle   = col.bg;
    ctx.fill();
    ctx.lineWidth   = isHov ? 2 : 1.2;
    ctx.strokeStyle = isHov ? col.stroke : col.edge;
    ctx.stroke();
    ctx.restore();

    if (cam.scale > 0.45 || isHov) {
      const fs = 9, pad = 2;
      ctx.font = `500 ${fs}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const maxW = 100;
      const words = nd.name.split(' ');
      let line = '', lines = [];
      for (const w of words) {
        const t = line ? line + ' ' + w : w;
        if (line && ctx.measureText(t).width > maxW) { lines.push(line); line = w; }
        else line = t;
      }
      if (line) lines.push(line);
      lines = lines.slice(0, 2);
      lines.forEach((ln, li) => {
        const tw = ctx.measureText(ln).width;
        const tx = nd.x, ty = nd.y + r + 3 + li * (fs + 2);
        ctx.fillStyle = dark ? 'rgba(15,23,42,0.82)' : 'rgba(255,255,255,0.88)';
        ctx.fillRect(tx - tw / 2 - pad, ty - 1, tw + pad * 2, fs + 2);
        ctx.fillStyle = col.text;
        ctx.fillText(ln, tx, ty);
      });
    }
  });

  ctx.restore();
}

function umapHitTest(sx, sy) {
  const canvas = UMAP.canvas;
  if (!canvas) return -1;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const cam = UMAP.camera;
  const wx = (sx - w / 2) / cam.scale + cam.x;
  const wy = (sy - h / 2) / cam.scale + cam.y;
  for (let i = UMAP.nodes.length - 1; i >= 0; i--) {
    const nd = UMAP.nodes[i];
    const dx = wx - nd.x, dy = wy - nd.y;
    if (dx * dx + dy * dy <= (nd.r + 5) * (nd.r + 5)) return i;
  }
  return -1;
}

function umapLoop() {
  if (UMAP.alpha > EU.STOP_ALPHA) umapTick();
  umapDraw();
  UMAP.raf = requestAnimationFrame(umapLoop);
}

function umapFit() {
  if (!UMAP.nodes.length) return;
  const canvas = UMAP.canvas;
  if (!canvas) return;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  if (!cw || !ch) { UMAP.camera.scale = 0.2; return; }
  const xs = UMAP.nodes.map(n => n.x), ys = UMAP.nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const pad = 60;
  const sx = (cw - pad * 2) / (maxX - minX || 1);
  const sy = (ch - pad * 2) / (maxY - minY || 1);
  UMAP.camera.scale = Math.min(sx, sy, 2);
  UMAP.camera.x = (minX + maxX) / 2;
  UMAP.camera.y = (minY + maxY) / 2;
}

function openUnifiedMap() {
  umapStop();
  const view   = document.getElementById('uniMapView');
  const canvas = document.getElementById('uniMapCanvas');
  UMAP.canvas  = canvas;

  const hdr  = document.querySelector('header');
  const vTog = document.getElementById('viewToggle');
  view.style.top = ((hdr?.offsetHeight || 0) + (vTog?.offsetHeight || 0)) + 'px';
  view.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  umapRenderToggles();
  umapBuild();

  // Double RAF: first lets the browser paint the overlay (flex layout),
  // second reads real canvas dimensions for the fit calculation.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    for (let k = 0; k < 80; k++) umapTick();  // warm-up physics
    umapFit();
    umapLoop();
  }));
}

function closeUnifiedMap() {
  umapStop();
  document.getElementById('uniMapView').style.display = 'none';
  document.body.style.overflow = '';
}

function umapRenderToggles() {
  const bar = document.getElementById('uniMapToggles');
  if (!bar) return;
  const types = [
    { prefix: 'METAC', label: i('viewTecnicas') },
    { prefix: 'TEC',   label: i('evalCatTec')  },
    { prefix: 'INS',   label: i('evalCatIns')  },
    { prefix: 'HER',   label: i('evalCatHer')  },
    { prefix: 'DIM',   label: i('evalCatDim')  },
  ];
  const dark = document.documentElement.dataset.theme === 'dark';
  const pal  = dark ? EGPAL.dark : EGPAL.light;

  bar.innerHTML = types.map(t => {
    const col = pal[t.prefix];
    const active = UMAP.vis[t.prefix];
    return `<button class="umap-toggle${active ? ' on' : ''}" data-prefix="${t.prefix}"
      style="background:${active ? col.bg : 'transparent'};color:${active ? col.text : 'var(--text-muted)'};border-color:${active ? col.edge : 'var(--border)'}"
    >${esc(t.label)}</button>`;
  }).join('');

  bar.querySelectorAll('.umap-toggle').forEach(btn => {
    btn.onclick = () => {
      UMAP.vis[btn.dataset.prefix] = !UMAP.vis[btn.dataset.prefix];
      umapBuild();
      umapRenderToggles();
    };
  });
}

function initUnifiedMapEvents() {
  const canvas = document.getElementById('uniMapCanvas');
  if (!canvas) return;

  document.getElementById('uniMapCloseBtn').onclick = closeUnifiedMap;
  document.getElementById('uniMapFitBtn').onclick   = umapFit;

  const prinBtn = document.getElementById('uniMapPrinBtn');
  if (prinBtn) {
    prinBtn.onclick = () => {
      UMAP.onlyPrincipal = !UMAP.onlyPrincipal;
      prinBtn.classList.toggle('active', UMAP.onlyPrincipal);
      umapBuild();
    };
  }

  let pointers = new Map(), lastPinchDist = 0;

  canvas.addEventListener('pointermove', e => {
    pointers.set(e.pointerId, e);
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

    if (pointers.size === 2) {
      const pts = [...pointers.values()];
      const dx = pts[0].clientX - pts[1].clientX, dy = pts[0].clientY - pts[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastPinchDist) {
        UMAP.camera.scale = Math.max(0.08, Math.min(4, UMAP.camera.scale * dist / lastPinchDist));
      }
      lastPinchDist = dist;
      return;
    } else { lastPinchDist = 0; }

    if (UMAP.isPanning) {
      UMAP.camera.x = UMAP.camStart.x - (e.clientX - UMAP.panStart.x) / UMAP.camera.scale;
      UMAP.camera.y = UMAP.camStart.y - (e.clientY - UMAP.panStart.y) / UMAP.camera.scale;
      UMAP.panMoved = true;
      return;
    }
    const hit = umapHitTest(sx, sy);
    if (hit !== UMAP.hover) {
      UMAP.hover = hit;
      canvas.classList.toggle('hovering', hit >= 0);
    }
  });

  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, e);
    UMAP.isPanning = true;
    UMAP.panMoved  = false;
    UMAP.panStart  = { x: e.clientX, y: e.clientY };
    UMAP.camStart  = { ...UMAP.camera };
  });

  const finishPtr = e => {
    pointers.delete(e.pointerId);
    if (!UMAP.panMoved) {
      const rect = canvas.getBoundingClientRect();
      const hit = umapHitTest(e.clientX - rect.left, e.clientY - rect.top);
      if (hit >= 0) {
        const nd = UMAP.nodes[hit];
        closeUnifiedMap();
        if (nd.prefix === 'METAC') openModal(nd.id);
        else openEvalModal(nd.id);
      }
    }
    UMAP.isPanning = false;
    UMAP.panMoved  = false;
  };
  canvas.addEventListener('pointerup',     finishPtr);
  canvas.addEventListener('pointercancel', finishPtr);

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    UMAP.camera.scale = Math.max(0.08, Math.min(4, UMAP.camera.scale * (e.deltaY < 0 ? 1.12 : 0.9)));
  }, { passive: false });

  new MutationObserver(() => { if (UMAP.raf) umapDraw(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

// ─── INIT ────────────────────────────────────────────────────────────────────

async function init() {
  loadFavs();
  loadCats();
  updateFavBadge();
  loadLangPref();

  // Read URL params (override saved preference)
  const p = new URLSearchParams(location.search);
  const urlLang = p.get('lang');
  if (p.has('lang')) S.lang = resolveLang(urlLang);
  const t = p.get('t');
  if (t) S.shared = uniqueIds(t.split(','));
  const tname = p.get('tname');
  if (tname) S.sharedName = tname;

  applyI18N();
  updateSharedBanner();

  // Load data
  try { await loadLang(S.lang); }
  catch {
    document.getElementById('main').innerHTML = `<div class="state-box"><h3>${i('error')}</h3></div>`;
    return;
  }
  if (S.shared) S.shared = refsToItemIds(S.shared);
  syncActiveFilters();
  updateFavBadge();
  updateSharedBanner();

  renderViewToggle();
  renderBlockTabs();
  renderTabs();
  renderCards();

  // Load evalmap data in background (needed for "Cómo evaluar" sections)
  loadEvalLang(S.lang).catch(() => {});

  // Auto-open modal for single shared methodological resource
  if (S.shared && S.shared.length === 1) openModal(S.shared[0]);

  // ── Event listeners ──────────────────────────────────────────────────────

  // View toggle
  document.querySelectorAll('.view-btn[data-view]').forEach(btn => {
    btn.onclick = () => {
      if (S.view === btn.dataset.view) return;
      S.search = '';
      document.getElementById('searchInput').value = '';
      updateSearchUI();
      switchView(btn.dataset.view);
      // Load eval data on first switch to evaluacion view
      if (btn.dataset.view === 'evaluacion') loadEvalLang(S.lang).then(renderEvalCards).catch(() => {});
    };
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    S.search = e.target.value;
    S.page = 0;
    updateSearchUI();
    if (S.view === 'evaluacion') renderEvalCards();
    else renderCards();
  });
  document.getElementById('searchClearBtn').onclick = () => {
    const input = document.getElementById('searchInput');
    input.value = '';
    S.search = '';
    S.page = 0;
    updateSearchUI();
    if (S.view === 'evaluacion') renderEvalCards();
    else renderCards();
    input.focus();
  };

  document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme-pref') || 'auto';
    const next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });

  document.querySelectorAll('.lang-btn').forEach(b => b.onclick = () => switchLang(b.dataset.lang));

  initEvalMapEvents();
  initUnifiedMapEvents();
  document.getElementById('uniMapBtn').onclick    = () => { loadEvalLang(S.lang).then(openUnifiedMap).catch(() => {}); };
  const uniLabel = document.getElementById('uniMapLabel');
  if (uniLabel) uniLabel.textContent = 'Mapa unificado';
  document.getElementById('mapViewBtn').onclick   = toggleMapView;
  document.getElementById('mapZoomIn').onclick    = () => { MAP.camera.scale = Math.min(6, MAP.camera.scale * 1.25); };
  document.getElementById('mapZoomOut').onclick   = () => { MAP.camera.scale = Math.max(0.12, MAP.camera.scale / 1.25); };
  document.getElementById('mapFitBtn').onclick    = mapFitAll;
  document.getElementById('mapResetBtn').onclick  = () => { if (MAP.viewMode === 'blocks') initMapBlocks(); else initMapData(); };
  const gapLabel = document.getElementById('mapGapLabel');
  const gapMinus = document.getElementById('mapGapMinus');
  const gapPlus  = document.getElementById('mapGapPlus');
  const GAP_MIN = 0, GAP_MAX = 100, GAP_STEP = 4;

  function updateGapUI() {
    if (gapLabel) gapLabel.textContent = MAP.gap;
    if (gapMinus) gapMinus.disabled = MAP.gap <= GAP_MIN;
    if (gapPlus)  gapPlus.disabled  = MAP.gap >= GAP_MAX;
  }

  if (gapMinus) gapMinus.onclick = () => { MAP.gap = Math.max(GAP_MIN, MAP.gap - GAP_STEP); updateGapUI(); MAP.alpha = Math.max(MAP.alpha, 0.6); };
  if (gapPlus)  gapPlus.onclick  = () => { MAP.gap = Math.min(GAP_MAX, MAP.gap + GAP_STEP); updateGapUI(); MAP.alpha = Math.max(MAP.alpha, 0.6); };
  updateGapUI();
  document.getElementById('mapPanelClose').onclick = () => { mapSelectNode(-1); };
  document.getElementById('mapPanelToggle').onclick = e => {
    e.stopPropagation();
    mapSetPanelCollapsed(!MAP.panelCollapsed);
  };
  mapSetupPanelDrag();
  mapSetupLegendDrag();
  // Allow touch-scroll inside panel without canvas intercepting events
  const panelScroll = document.querySelector('.map-panel-scroll');
  if (panelScroll) {
    panelScroll.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    panelScroll.addEventListener('touchmove',  e => e.stopPropagation(), { passive: true });
  }
  document.getElementById('mapDepthMinus').addEventListener('click', e => { e.stopPropagation(); mapSetDepth(MAP.depth - 1); });
  document.getElementById('mapDepthPlus').addEventListener('click',  e => { e.stopPropagation(); mapSetDepth(MAP.depth + 1); });

  document.getElementById('mapLegendBtn').addEventListener('click', e => {
    e.stopPropagation();
    S.mapLegendVisible = !S.mapLegendVisible;
    localStorage.setItem('metac_map_legend_v1', S.mapLegendVisible ? 'shown' : 'hidden');
    document.getElementById('mapLegendBtn').classList.toggle('active', S.mapLegendVisible);
    updateMapLegend();
  });

  document.getElementById('mapColorModeBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('mapColorDropdown');
    if (dd) dd.style.display = dd.style.display === 'none' ? '' : 'none';
  });
  document.addEventListener('click', () => {
    const dd = document.getElementById('mapColorDropdown');
    if (dd) dd.style.display = 'none';
  });
  mapSetupEvents();

  document.getElementById('selectBtn').onclick = toggleSelectMode;
  document.getElementById('favBtn').onclick = openPanel;
  document.getElementById('panelClose').onclick = closePanel;
  document.getElementById('panelOverlay').onclick = e => { if (e.target === e.currentTarget) closePanel(); };

  document.getElementById('modalCloseBtn').onclick    = closeModal;
  document.getElementById('modalCopyBtn').onclick     = copyModal;
  document.getElementById('modalPrintBtn').onclick    = printModal;
  document.getElementById('modalCloseBtnFooter').onclick = closeModal;
  document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };

  document.getElementById('modalBackBtn').onclick = () => {
    const prev = S.modalHistory.pop();
    if (!prev) return;
    if (typeof prev === 'string') { openModal(prev); return; }
    if (prev.type === 'eval') openEvalModal(prev.id);
    else openModal(prev.id);
  };
  document.getElementById('modalFavBtn').onclick = e => { if (S.modal !== null) toggleFav(S.modal, e.currentTarget); };
  document.getElementById('modalShareBtn').onclick = () => { if (S.modal !== null) copy(shareURL([S.modal])); };

  document.getElementById('clearFavsBtn').onclick = () => {
    if (!confirm(i('clearConfirm'))) return;
    S.favorites.clear(); S.categories = []; saveFavs(); saveCats(); updateFavBadge(); renderCards(); renderPanel();
  };

  document.getElementById('exitSharedBtn').onclick = () => {
    clearSelection(false);
    S.shared = null;
    S.page = 0;
    const u = new URL(location.href);
    u.searchParams.delete('t');
    u.searchParams.delete('tname');
    history.replaceState({}, '', u);
    updateSharedBanner();
    applyI18N();
    renderCards();
  };

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    else if (document.getElementById('panelOverlay').classList.contains('open')) closePanel();
    else if (S.selectMode) clearSelection();
    else if (S.mapMode) toggleMapView();
  });
}

init();
</script>

<script>
(function () {
  const ANALYTICS_FALLBACK_ENDPOINT = 'https://bilateria.org/app/estadistica/metac/track.php';
  const ANALYTICS_FALLBACK_SITE_ID = 'metac';
  const ANALYTICS_COOLDOWN_MS = 30 * 60 * 1000;
  const ANALYTICS_TIMEOUT_MS = 4000;

  function getMetaContent(name) {
    const node = document.querySelector(`meta[name="${name}"]`);
    return node ? String(node.getAttribute('content') || '').trim() : '';
  }

  function getAnalyticsConfig() {
    return {
      endpoint: getMetaContent('analytics-endpoint') || ANALYTICS_FALLBACK_ENDPOINT,
      siteId: getMetaContent('analytics-site-id') || ANALYTICS_FALLBACK_SITE_ID
    };
  }

  function shouldTrackAnalytics() {
    const protocol = String(window.location.protocol || '');
    const hostname = String(window.location.hostname || '').toLowerCase();
    if (protocol !== 'http:' && protocol !== 'https:') return false;
    if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '::1') return false;
    return !hostname.endsWith('.local');
  }

  function getStorageKey(siteId) {
    return `analytics:last-visit:${siteId}`;
  }

  function shouldCountVisit(siteId) {
    try {
      const lastVisit = Number.parseInt(window.localStorage.getItem(getStorageKey(siteId)) || '', 10);
      return !Number.isFinite(lastVisit) || (Date.now() - lastVisit) > ANALYTICS_COOLDOWN_MS;
    } catch (error) {
      return true;
    }
  }

  function rememberVisit(siteId) {
    try {
      window.localStorage.setItem(getStorageKey(siteId), String(Date.now()));
    } catch (error) {
      // Analytics must never affect the public app.
    }
  }

  function requestAnalytics() {
    if (!shouldTrackAnalytics()) return;

    const config = getAnalyticsConfig();
    if (!config.endpoint) return;

    const countVisit = shouldCountVisit(config.siteId);
    const callbackName = `__metacAnalytics_${Date.now().toString(36)}_${Math.random().toString(36).slice(2)}`;
    const pageParams = new URLSearchParams(window.location.search || '');
    const query = new URLSearchParams();
    const script = document.createElement('script');
    let settled = false;
    let timeoutId = 0;

    function cleanup() {
      if (settled) return;
      settled = true;
      if (timeoutId) window.clearTimeout(timeoutId);
      try {
        delete window[callbackName];
      } catch (error) {
        window[callbackName] = undefined;
      }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    query.set('site', config.siteId);
    query.set('callback', callbackName);
    query.set('page_url', window.location.href);
    query.set('referrer', document.referrer || '');
    if (!countVisit) query.set('summary_only', '1');

    ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(key => {
      const value = String(pageParams.get(key) || '').trim();
      if (value) query.set(key, value);
    });

    window[callbackName] = function (payload) {
      try {
        if (countVisit && payload && payload.ok) rememberVisit(config.siteId);
      } finally {
        cleanup();
      }
    };

    script.async = true;
    script.src = `${config.endpoint}${config.endpoint.includes('?') ? '&' : '?'}${query.toString()}`;
    script.onerror = cleanup;
    timeoutId = window.setTimeout(cleanup, ANALYTICS_TIMEOUT_MS);
    document.head.appendChild(script);
  }

  function initAnalytics() {
    const run = function () {
      try {
        window.setTimeout(requestAnalytics, 0);
      } catch (error) {
        // Silent failure by design.
      }
    };

    if (typeof window.requestIdleCallback === 'function') {
      window.requestIdleCallback(run, { timeout: 2500 });
      return;
    }
    if (document.readyState === 'complete') {
      run();
      return;
    }
    window.addEventListener('load', run, { once: true });
  }

  initAnalytics();
})();
</script>
