<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo de Metac</title>
  <desc id="desc">Logo de Metac, Metodologías Activas, con una M principal y una A secundaria desplazada hacia abajo.</desc>

  <defs>
    <linearGradient id="bg" x1="150" y1="120" x2="880" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>

    <linearGradient id="card" x1="250" y1="235" x2="780" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7f5f1"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#082f49" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1024" height="1024" rx="224" fill="#f8fafc"/>
  <circle cx="512" cy="512" r="390" fill="url(#bg)"/>

  <!-- Red sutil: aprendizaje activo, conexiones y colaboración -->
  <g opacity="0.32" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round">
    <path d="M286 351 C380 268 480 285 553 360"/>
    <path d="M690 318 C624 394 630 475 710 544"/>
    <path d="M303 681 C420 745 562 746 713 655"/>
  </g>

  <g fill="#ffffff" opacity="0.55">
    <circle cx="282" cy="352" r="20"/>
    <circle cx="553" cy="360" r="18"/>
    <circle cx="690" cy="318" r="20"/>
    <circle cx="710" cy="544" r="18"/>
    <circle cx="303" cy="681" r="20"/>
    <circle cx="713" cy="655" r="20"/>
  </g>

  <!-- Tarjeta central -->
  <g filter="url(#shadow)">
    <rect x="216" y="240" width="592" height="544" rx="76" fill="url(#card)"/>
  </g>

  <!-- Monograma: M de Metodologías -->
  <path d="M310 662 V354
           C310 333 327 316 348 316
           H392
           C409 316 425 326 433 342
           L512 493
           L591 342
           C599 326 615 316 632 316
           H676
           C697 316 714 333 714 354
           V662
           H627
           V467
           L546 616
           C539 629 526 637 512 637
           C498 637 485 629 478 616
           L397 467
           V662
           Z"
        fill="#0f172a"/>

  <!-- A de Activas: más pequeña, color distinto y desplazada hacia abajo -->
  <g transform="translate(572 515)">
    <path d="M73 0
             C84 0 94 7 98 18
             L169 205
             H123
             L111 168
             H35
             L23 205
             H-22
             L49 18
             C53 7 62 0 73 0
             Z
             M48 130
             H98
             L73 54
             Z"
          fill="#f59e0b"/>
    <path d="M35 168 H111" stroke="#fff7ed" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Líneas inferiores: catálogo / datos CSV -->
  <g stroke="#0f766e" stroke-linecap="round" stroke-width="22" opacity="0.9">
    <path d="M340 738 H684"/>
    <path d="M390 785 H634"/>
  </g>

  <g fill="#16a34a">
    <circle cx="312" cy="738" r="12"/>
    <circle cx="358" cy="785" r="12"/>
    <circle cx="712" cy="738" r="12"/>
    <circle cx="666" cy="785" r="12"/>
  </g>
</svg>
